<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>메뉴메이트</title>
  <style>
    :root {
      --primary: #ff8566;
      --background: #fffbf7;
      --surface: #fff8f3;
      --foreground: #2d2d3d;
      --muted: #8b9ba8;
      --border: #f0e6dc;
      --success: #7fd8be;
      --warning: #ffb366;
      --error: #ff9999;
      --shadow: 0 3px 12px rgba(45, 45, 61, .08);
      --radius: 16px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--foreground);
      background: #f2f2f2;
      overflow: hidden;
    }

    button, input {
      font: inherit;
      color: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      background: transparent;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      position: relative;
      width: min(100vw, 560px);
      height: 100dvh;
      margin: 0 auto;
      background: var(--background);
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(0,0,0,.04);
    }

    .scroll {
      height: 100%;
      overflow-y: auto;
      padding: 12px 16px 96px;
      -webkit-overflow-scrolling: touch;
      background:
        radial-gradient(circle at 12% 0%, rgba(255,133,102,.12), transparent 28%),
        linear-gradient(180deg, #fffbf7 0%, #fffaf6 100%);
    }

    .tabbar {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 72px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 7px 4px max(8px, env(safe-area-inset-bottom));
      z-index: 10;
    }

    .tab {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
      border-radius: 10px;
    }

    .tab .icon { font-size: 20px; line-height: 1; }
    .tab.active { color: var(--primary); }

    .hero {
      background: var(--primary);
      color: #fff;
      border-radius: 24px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 4px 12px rgba(255,133,102,.22);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .hero-copy {
      min-width: 0;
    }

    .hero h1 {
      margin: 0 0 6px;
      font-size: 32px;
      line-height: 1.05;
      letter-spacing: 0;
      font-weight: 900;
    }

    .hero p {
      margin: 0;
      color: rgba(255,255,255,.85);
      font-size: 14px;
      font-weight: 600;
    }

    .feedback-btn {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 40px;
      padding: 0 13px;
      border: 1px solid rgba(255,255,255,.55);
      border-radius: 999px;
      background: rgba(255,255,255,.18);
      color: #fff;
      font-size: 12px;
      font-weight: 900;
      line-height: 1;
      white-space: nowrap;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.18);
    }

    .feedback-btn:active {
      opacity: .82;
      transform: scale(.98);
    }

    .notice {
      border-left: 4px solid var(--primary);
      background: rgba(255,133,102,.07);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 24px;
    }

    .notice strong { display: block; font-size: 14px; line-height: 20px; }
    .notice span { display: block; margin-top: 6px; color: var(--muted); font-size: 13px; line-height: 18px; font-weight: 600; }

    .quote {
      min-height: 220px;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 28px;
      display: grid;
      place-items: center;
      text-align: center;
      gap: 12px;
      padding: 32px;
      margin-bottom: 32px;
      box-shadow: var(--shadow);
    }

    .quote .big { font-size: 72px; line-height: 1; }
    .quote b { font-size: 20px; line-height: 32px; font-weight: 900; }

    .section-title {
      margin: 8px 0 16px;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 0;
    }

    .divider-section {
      border-bottom: 1.5px solid var(--border);
      padding-bottom: 24px;
      margin-bottom: 36px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .card {
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: 0 2px 6px rgba(0,0,0,.05);
    }

    .press-card {
      min-height: 140px;
      border-radius: 22px;
      padding: 18px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,.06);
      transition: transform .12s ease, opacity .12s ease;
    }

    .press-card:active { transform: scale(.98); opacity: .86; }
    .press-card .emoji { font-size: 44px; line-height: 1; }
    .press-card b { font-size: 14px; font-weight: 900; }
    .press-card span { font-size: 12px; color: var(--muted); font-weight: 600; line-height: 17px; }

    .screen-head {
      padding: 8px 4px 16px;
    }

    .back {
      display: inline-flex;
      align-items: center;
      color: var(--primary);
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 14px;
      padding: 6px 2px;
    }

    .screen-title {
      margin: 0;
      font-size: 26px;
      line-height: 1.2;
      font-weight: 900;
      letter-spacing: 0;
    }

    .screen-sub {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 20px;
      font-weight: 600;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .between {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .stack { display: grid; gap: 12px; }
    .stack-lg { display: grid; gap: 18px; }
    .wrap { display: flex; flex-wrap: wrap; gap: 8px; }

    .chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      padding: 7px 13px;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .chip.active {
      color: #fff;
      background: var(--primary);
      border-color: var(--primary);
    }

    .button {
      display: flex;
      min-height: 48px;
      width: 100%;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      background: var(--primary);
      color: #fff;
      font-size: 15px;
      font-weight: 900;
      box-shadow: 0 4px 10px rgba(255,133,102,.24);
    }

    .button.secondary {
      background: var(--surface);
      color: var(--foreground);
      border: 1px solid var(--border);
      box-shadow: none;
    }

    .button.soft {
      background: rgba(255,133,102,.12);
      color: var(--primary);
      border: 1px solid rgba(255,133,102,.26);
      box-shadow: none;
    }

    .input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
      min-height: 46px;
      padding: 10px 12px;
      outline: none;
      font-size: 14px;
      font-weight: 600;
    }

    .progress {
      height: 6px;
      border-radius: 3px;
      background: var(--border);
      overflow: hidden;
    }

    .progress > span {
      display: block;
      height: 100%;
      border-radius: 3px;
      background: var(--primary);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 4px 9px;
      background: rgba(255,133,102,.14);
      color: var(--primary);
      font-size: 12px;
      font-weight: 900;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .stat {
      border-radius: 14px;
      padding: 14px;
      border: 1.5px solid rgba(255,133,102,.28);
      background: rgba(255,133,102,.08);
    }

    .stat .v { font-size: 20px; font-weight: 900; color: var(--primary); }
    .stat .l { margin-top: 2px; font-size: 11px; color: var(--muted); font-weight: 700; }

    .bar {
      height: 8px;
      border-radius: 4px;
      background: var(--border);
      overflow: hidden;
    }

    .bar > span {
      display: block;
      height: 100%;
      border-radius: 4px;
      background: var(--primary);
    }

    .meal-row {
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 14px;
      padding: 12px 14px;
    }

    .meal-row .meal-icon { font-size: 24px; }
    .meal-row b { display: block; font-size: 15px; }
    .meal-row span { color: var(--muted); font-size: 11px; font-weight: 700; }

    .tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 4px;
    }

    .tabs button {
      min-height: 36px;
      border-radius: 9px;
      font-size: 13px;
      font-weight: 900;
      color: var(--foreground);
    }

    .tabs button.active {
      background: var(--primary);
      color: #fff;
    }

    .result-card {
      border-radius: 20px;
      padding: 18px;
      border: 1px solid var(--border);
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .result-card.top {
      background: rgba(255,133,102,.08);
      border: 2px solid var(--primary);
    }

    .toast {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 84px;
      z-index: 20;
      border-radius: 14px;
      padding: 12px 14px;
      background: rgba(45,45,61,.92);
      color: #fff;
      font-size: 13px;
      font-weight: 800;
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: .18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (min-width: 700px) {
      body { background: #ecebea; }
      .app { height: min(100dvh, 960px); }
    }
  </style>
</head>
<body>
  <main class="app" aria-live="polite">
    <section id="view" class="scroll"></section>
    <nav id="tabbar" class="tabbar"></nav>
    <div id="toast" class="toast"></div>
  </main>

  <script>
    const $ = (selector) => document.querySelector(selector);
    const view = $("#view");
    const tabbar = $("#tabbar");
    const toastEl = $("#toast");
    const FEEDBACK_FORM_URL = "https://forms.gle/dV7EtfZnUWxqF7bL6";

    const palette = {
      primary: "#FF8566",
      border: "#F0E6DC",
      muted: "#8B9BA8",
      surface: "#FFF8F3",
      foreground: "#2D2D3D",
      success: "#7FD8BE",
      warning: "#FFB366",
      error: "#FF9999"
    };

    const tabs = [
      { id: "home", label: "홈", icon: "🏠" },
      { id: "restaurants", label: "식당", icon: "🍽️" },
      { id: "community", label: "커뮤니티", icon: "👥" },
      { id: "calendar", label: "캘린더", icon: "📅" },
      { id: "profile", label: "프로필", icon: "👤" }
    ];

    const categories = [
      { id: "soup", name: "한식-국물류", emoji: "🍲" },
      { id: "korean", name: "한식-일반식", emoji: "🍚" },
      { id: "chinese", name: "중식", emoji: "🥟" },
      { id: "japanese", name: "일식", emoji: "🍣" },
      { id: "western", name: "양식", emoji: "🍝" },
      { id: "chicken", name: "치킨", emoji: "🍗" },
      { id: "burger", name: "햄버거", emoji: "🍔" },
      { id: "snack", name: "분식", emoji: "🍢" },
      { id: "pizza", name: "피자", emoji: "🍕" }
    ];

    const menuBank = {
      "한식-국물류": ["김치찌개", "된장찌개", "순두부찌개", "부대찌개", "감자탕", "해장국", "설렁탕", "곰탕", "삼계탕", "갈비탕", "육개장", "순댓국", "돼지국밥", "콩나물국밥", "어묵탕", "해물탕"],
      "한식-일반식": ["비빔밥", "제육볶음", "삼겹살", "불고기", "닭갈비", "보쌈", "김치볶음밥", "오징어덮밥", "참치마요덮밥", "돌솥비빔밥", "두부조림", "고등어조림"],
      "중식": ["짜장면", "짬뽕", "탕수육", "마파두부", "마라탕", "마라샹궈", "볶음밥", "유린기", "깐풍기", "군만두", "딤섬", "쟁반짜장"],
      "일식": ["초밥", "라멘", "돈코츠라멘", "우동", "돈카츠", "규동", "오야코동", "카레라이스", "텐동", "소바", "장어덮밥", "타코야키"],
      "양식": ["토마토파스타", "크림파스타", "알리오올리오", "스테이크", "리조또", "샐러드", "클럽샌드위치", "수프+빵", "그라탕", "함박스테이크"],
      "치킨": ["후라이드치킨", "양념치킨", "간장치킨", "마늘치킨", "불닭", "파닭", "반반치킨", "순살치킨", "닭강정", "허니갈릭치킨"],
      "햄버거": ["불고기버거", "치즈버거", "더블패티버거", "치킨버거", "스파이시버거", "베이컨버거", "새우버거", "와퍼", "빅맥", "버거세트"],
      "분식": ["떡볶이", "국물떡볶이", "로제떡볶이", "김밥", "참치김밥", "순대", "튀김", "라볶이", "쫄면", "어묵탕"],
      "피자": ["페퍼로니피자", "치즈피자", "불고기피자", "콤비네이션피자", "포테이토피자", "고구마피자", "하프앤하프", "마르게리타", "씨푸드피자", "바비큐치킨피자"]
    };

    const menuInfo = Object.entries(menuBank).flatMap(([category, names]) =>
      names.map((name, index) => ({
        id: `${category}-${index}`,
        name,
        category,
        emoji: categories.find(c => c.name === category)?.emoji || "🍽️",
        spicy: /마라|불닭|짬뽕|떡볶이|제육|육개장|김치|쭈꾸미|낙지/.test(name) ? 2 : 0,
        meat: !/비빔밥|된장|콩나물|샐러드|어묵|김밥|튀김|초밥|소바|우동|마르게리타|치즈피자/.test(name),
        price: /스테이크|삼겹살|초밥|피자|보쌈|갈비/.test(name) ? 2 : /치킨|라멘|돈카츠|파스타/.test(name) ? 1 : 0,
        desc: `${category}에서 많이 선택되는 메뉴입니다. 오늘 조건에 맞춰 무난하게 고르기 좋습니다.`
      }))
    );

    const quotes = [
      ["🐰", "함께 먹는 밥이 더 맛있다."]
    ];

    const samplePlaces = [
      ["맛있는 돈까스", "돈까스", "⭐ 4.8", "(245 리뷰)", "🍖"],
      ["라면 천국", "라면", "⭐ 4.6", "(189 리뷰)", "🍜"],
      ["피자 파티", "피자", "⭐ 4.5", "(312 리뷰)", "🍕"]
    ];

    const state = {
      screen: location.hash.replace("#", "") || "home",
      previous: "home",
      restaurantQuery: "",
      communityTab: "buddy",
      profileAllergens: [],
      rec: { step: "weather", weather: null, time: null, day: null, category: null, filters: {}, menuIndex: 0 },
      consensus: { step: "setup", count: 2, current: 0, profiles: [], results: [] },
      worldcup: { step: "category", selected: [], size: 16, menus: [], match: 0, winners: [], champion: null },
      fridge: { ingredients: [] },
      shopping: { selected: "김치찌개", people: 2, weather: null }
    };

    function route(screen, opts = {}) {
      state.previous = opts.backTo || state.screen || "home";
      state.screen = screen;
      if (opts.query) state.restaurantQuery = opts.query;
      history.replaceState(null, "", `#${screen}`);
      render();
      view.scrollTop = 0;
    }

    function toast(message) {
      toastEl.textContent = message;
      toastEl.classList.add("show");
      clearTimeout(toastEl._timer);
      toastEl._timer = setTimeout(() => toastEl.classList.remove("show"), 1700);
    }

    function renderTabs() {
      tabbar.innerHTML = tabs.map(t => `
        <button class="tab ${state.screen === t.id ? "active" : ""}" data-route="${t.id}">
          <span class="icon">${t.icon}</span>
          <span>${t.label}</span>
        </button>
      `).join("");
    }

    function backButton(label = "돌아가기") {
      return `<button class="back" data-action="back">← ${label}</button>`;
    }

    function hero() {
      return `
        <div class="hero">
          <div class="hero-copy">
            <h1>🍽️ 메뉴메이트</h1>
            <p>식사 결정을 가장 쉽게</p>
          </div>
          <button class="feedback-btn" data-action="feedback" aria-label="앱 피드백 남기기">
            <span>💬</span>
            <span>후기 남기기</span>
          </button>
        </div>
      `;
    }

    function home() {
      const q = quotes[0];
      return `
        ${hero()}
        <div class="notice">
          <strong>✨ 새로운 맛의 세계에 발을 들여보세요!</strong>
          <span>오늘은 어떤 음식으로 모험을 떠날까요?</span>
        </div>
        <div class="quote">
          <div class="big">${q[0]}</div>
          <b>${q[1]}</b>
        </div>
        <section class="divider-section">
          <h2 class="section-title">🎯 결정 모드</h2>
          <div class="grid">
            ${modeCard("consensus", "🤝", "합의 모드", "여러 명 의견 모으기", "#E8D5F2")}
            ${modeCard("worldcup", "🏆", "음식 월드컵", "토너먼트로 선택하기", "#FFE8B6")}
            ${modeCard("cooking", "🍳", "집밥 모드", "냉장고 모드 · 장보기 모드", "#FFF0D6")}
            ${modeCard("custom", "🎯", "맞춤추천", "질문으로 메뉴 추천", "#E8F5E9")}
          </div>
        </section>
        <section>
          <h2 class="section-title">✨ 더 많은 기능</h2>
          <div class="grid">
            ${modeCard("popular", "⭐", "인기 맛집", "동네별 실시간 랭킹", "#FFE8D6")}
          </div>
        </section>
      `;
    }

    function modeCard(routeId, emoji, title, desc, color) {
      return `
        <button class="press-card" style="background:${color}" data-route="${routeId}">
          <span class="emoji">${emoji}</span>
          <b>${title}</b>
          <span>${desc}</span>
        </button>
      `;
    }

    function restaurants() {
      const query = state.restaurantQuery || "";
      const normalized = query.trim();
      const places = samplePlaces

    function scoreCategories() {
      const base = {
        "한식-국물류": 2, "한식-일반식": 1, "중식": 1, "일식": 1, "양식": 1, "치킨": 1, "햄버거": 0, "분식": 1, "피자": 1
      };
      const bump = {
        "더움": {"일식":2,"햄버거":1,"치킨":1,"한식-국물류":-2},
        "추움": {"한식-국물류":3,"중식":2,"분식":1},
        "비·눈": {"한식-국물류":3,"피자":1,"치킨":1},
        "맑음·선선": {"치킨":2,"양식":1,"피자":1},
        "아침": {"한식-국물류":2,"양식":1,"치킨":-2},
        "점심": {"한식-일반식":2,"중식":2,"분식":2},
        "저녁": {"일식":2,"양식":2,"치킨":1},
        "야식": {"치킨":3,"분식":2,"피자":2},
        "금·토 저녁": {"치킨":2,"피자":2,"중식":1}
      };
      return categories.map(c => {
        let score = base[c.name] || 0;
        [state.rec.weather, state.rec.time, state.rec.day].forEach(k => {
          if (k && bump[k] && bump[k][c.name]) score += bump[k][c.name];
        });
        return { ...c, score };
      }).sort((a,b)=>b.score-a.score);
    }

    function recResult() {
      return `<div class="notice"><strong>선택한 조건</strong><span>${state.rec.weather || "날씨 미선택"} · ${state.rec.time || "시간 미선택"} · ${state.rec.day || "요일 미선택"}</span></div><div class="stack">${scoreCategories().map((c,i)=>`<button class="result-card ${i < 3 ? "top" : ""}" style="text-align:left" data-action="rec-category" data-value="${c.name}"><div class="between"><div class="row"><span style="font-size:${i===0?32:26}px">${c.emoji}</span><div><b>${i===0?"🥇":i===1?"🥈":i===2?"🥉":i+1+"위"} ${c.name}</b><div style="font-size:12px;color:var(--muted);font-weight:700">날씨·시간·요일 조건 반영</div></div></div><span class="badge" style="${i===0?"background:var(--primary);color:#fff":""}">${c.score}점</span></div></button>`).join("")}</div><div class="stack" style="margin-top:20px"><button class="button" data-action="rec-reset">🔄 다시 추천받기</button></div>`;
    }

    function recFilter() {
      const filters = ["가볍게", "든든하게", "매콤", "담백", "가성비", "새로운 맛"];
      return `<div class="card row" style="margin-bottom:18px"><span style="font-size:26px">${categories.find(c=>c.name===state.rec.category)?.emoji || "🍽️"}</span><div><b>${state.rec.category}</b><div style="font-size:12px;color:var(--muted);font-weight:700">총 ${menuBank[state.rec.category]?.length || 0}개 메뉴</div></div></div><div class="wrap">${filters.map(f=>`<button class="chip ${state.rec.filters[f] ? "active" : ""}" data-action="rec-filter" data-value="${f}">${f}</button>`).join("")}</div><div class="stack" style="margin-top:24px"><button class="button" data-action="rec-menu">메뉴 추천받기 →</button><button class="button secondary" data-action="rec-back-result">← 카테고리 순위로</button></div>`;
    }

    function recMenu() {
      const menus = menuInfo.filter(m => m.category === state.rec.category);
      const menu = menus[state.rec.menuIndex % menus.length] || menuInfo[0];
      const applied = Object.keys(state.rec.filters).filter(k => state.rec.filters[k]);
      return `<div class="notice"><strong>적용된 필터</strong><span>${applied.length ? applied.join(" · ") : "필터 없음 (전체)"}</span></div><div class="result-card top" style="text-align:center"><div class="between"><span class="badge">${menu.category}</span><span style="font-size:12px;color:var(--muted);font-weight:800">${state.rec.menuIndex + 1} / ${menus.length}</span></div><div style="font-size:46px;margin:18px 0 8px">${menu.emoji}</div><h2 style="font-size:32px;margin:0 0 14px">${menu.name}</h2><div class="notice" style="text-align:left;margin-bottom:16px"><strong>💡 추천 이유</strong><span>${menu.desc}</span></div><div class="wrap" style="justify-content:center"><span class="badge">든든하게</span><span class="badge">후회 적음</span><span class="badge">오늘 조건 적합</span></div><button class="button soft" style="margin-top:18px" data-route="restaurants" data-query="${menu.name}">🏪 이 메뉴 파는 식당 찾기</button></div><div class="stack" style="margin-top:18px"><button class="button" data-action="rec-next-menu">🔀 다른 메뉴 추천받기</button><button class="button secondary" data-action="rec-back-filter">← 필터 수정</button><button class="button secondary" data-action="rec-reset">🔄 처음부터 다시</button></div>`;
    }

    function consensus() {
      const c = state.consensus;
      if (!c.profiles.length) c.profiles = Array.from({length:c.count}, (_,i)=>defaultProfile(i));
      const sub = c.step === "setup" ? "인원을 설정하세요" : c.step === "taste" ? `${profileName()}의 취향을 입력하세요` : c.step === "avoid" ? `${profileName()}이(가) 절대 싫은 메뉴를 선택하세요` : "그룹 최적 메뉴 추천 결과";
      return `
        <div class="screen-head">
          ${backButton()}
          <h1 class="screen-title" style="text-align:center">🤝 합의 모드</h1>
          <p class="screen-sub" style="text-align:center">${sub}</p>
        </div>
        <div class="progress" style="margin-bottom:24px"><span style="width:${c.step==="setup"?10:c.step==="taste"?35+c.current*15:c.step==="avoid"?65+c.current*15:100}%"></span></div>
        ${c.step === "setup" ? consensusSetup() : c.step === "taste" ? consensusTaste() : c.step === "avoid" ? consensusAvoid() : consensusResult()}
      `;
    }

    function defaultProfile(i) {
      return { name: "", spicy: "보통", meat: "상관없음", budget: "상관없음", categories: [], avoid: [] };
    }

    function profileName() {
      const p = state.consensus.profiles[state.consensus.current];
      return p?.name || `참여자 ${state.consensus.current + 1}`;
    }

    function consensusSetup() {
      const c = state.consensus;
      return `<h2 class="section-title">👥 몇 명이 함께 먹나요?</h2><div class="grid">${[2,3,4,5,6].map((n,i)=>`<button class="press-card" style="background:${c.count===n?"var(--primary)":"var(--surface)"};color:${c.count===n?"#fff":"var(--foreground)"}" data-action="consensus-count" data-value="${n}"><span class="emoji">${["👤","👥","👨‍👩‍👦","👨‍👩‍👧‍👦","🏘️"][i]}</span><b>${n}명</b></button>`).join("")}</div><h2 class="section-title" style="margin-top:24px">참여자 이름 (선택)</h2><div class="stack">${Array.from({length:c.count},(_,i)=>`<input class="input consensus-name" data-index="${i}" value="${escapeHtml(c.profiles[i]?.name || "")}" placeholder="참여자 ${i+1} 이름" />`).join("")}</div><button class="button" style="margin-top:24px" data-action="consensus-next">다음 →</button>`;
    }

    function consensusTaste() {
      const p = state.consensus.profiles[state.consensus.current];
      return `<div class="wrap" style="margin-bottom:20px">${state.consensus.profiles.map((p,i)=>`<span class="badge" style="${i===state.consensus.current?"background:var(--primary);color:#fff":""}">${p.name || "참여자 " + (i+1)}</span>`).join("")}</div>${optionBlock("🌶️ 매운맛 선호도", "consensus-spicy", ["못먹음","약간","보통","매운거좋아"], p.spicy)}${optionBlock("🥩 고기 선호도", "consensus-meat", ["좋아함","상관없음","채식선호"], p.meat)}${optionBlock("💰 예산", "consensus-budget", ["5천원이하","1만원이하","1만5천원이하","상관없음"], p.budget)}<h2 class="section-title">🍽️ 선호 음식 종류</h2><div class="wrap">${categories.map(cat=>`<button class="chip ${p.categories.includes(cat.name)?"active":""}" data-action="consensus-category" data-value="${cat.name}">${cat.emoji} ${cat.name}</button>`).join("")}</div><div class="row" style="margin-top:24px">${state.consensus.current>0?'<button class="button secondary" data-action="consensus-prev">← 이전</button>':""}<button class="button" data-action="consensus-next">다음 →</button></div>`;
    }

    function optionBlock(title, action, options, selected) {
      return `<h2 class="section-title">${title}</h2><div class="wrap" style="margin-bottom:18px">${options.map(o=>`<button class="chip ${selected===o?"active":""}" data-action="${action}" data-value="${o}">${o}</button>`).join("")}</div>`;
    }

    function consensusAvoid() {
      const p = state.consensus.profiles[state.consensus.current];
      return `<div class="notice" style="border-color:#EF4444;background:#FFF0F0"><strong style="color:#C62828">🚫 "이건 절대 안 돼요" 메뉴를 최대 2개 선택하세요</strong><span>싫어하는 메뉴를 빼는 게 갈등을 줄이는 가장 쉬운 방법이에요</span></div><p class="screen-sub">${p.avoid.length}/2개 선택됨</p><div class="stack-lg">${categories.map(cat=>`<div><b>${cat.emoji} ${cat.name}</b><div class="wrap" style="margin-top:8px">${menuBank[cat.name].slice(0,8).map(m=>`<button class="chip ${p.avoid.includes(m)?"active":""}" style="${p.avoid.includes(m)?"background:#EF4444;border-color:#EF4444":""}" data-action="consensus-avoid" data-value="${m}">${p.avoid.includes(m)?"🚫 ":""}${m}</button>`).join("")}</div></div>`).join("")}</div><div class="row" style="margin-top:24px"><button class="button secondary" data-action="consensus-prev">← 이전</button><button class="button" data-action="consensus-next">${state.consensus.current===state.consensus.count-1?"✨ 결과 보기":"다음 →"}</button></div>`;
    }

    function consensusResult() {
      const results = state.consensus.results.length ? state.consensus.results : calcConsensus();
      state.consensus.results = results;
      return `<div class="notice"><strong>👥 ${state.consensus.count}명의 취향을 분석했어요</strong><span>${state.consensus.profiles.map((p,i)=>`${p.name || "참여자 " + (i+1)}: ${p.spicy}, ${p.meat}, ${p.budget}`).join("<br>")}</span></div><div class="stack">${results.slice(0,8).map((r,i)=>`<div class="result-card ${i===0?"top":""}"><div class="between"><div class="row"><span style="font-size:24px">${i===0?"🥇":i===1?"🥈":i===2?"🥉":i+1+"."}</span><div><b style="font-size:18px">${r.name}</b><div style="font-size:12px;color:var(--muted);font-weight:700">${r.emoji} ${r.category}</div></div></div><span class="badge" style="${r.score>=75?"background:#4CAF50;color:#fff":""}">${r.score}%</span></div><div class="bar" style="margin-top:12px"><span style="width:${r.score}%;background:${r.score>=75?"#4CAF50":r.score>=55?"#F59E0B":"#EF4444"}"></span></div><div class="wrap" style="margin-top:10px"><span class="badge">모두 무난</span><span class="badge">갈등 낮음</span><span class="badge">예산 확인</span></div></div>`).join("")}</div><button class="button secondary" style="margin-top:20px" data-action="consensus-restart">🔄 다시 설정하기</button>`;
    }

    function calcConsensus() {
      const spiceMap = { "못먹음":0, "약간":1, "보통":2, "매운거좋아":3 };
      const budgetMap = { "5천원이하":0, "1만원이하":1, "1만5천원이하":2, "상관없음":3 };
      return menuInfo.map(m => {
        const scores = state.consensus.profiles.map(p => {
          if (p.avoid.includes(m.name)) return 0;
          let s = 60;
          if (p.categories.includes(m.category)) s += 20;
          if (p.categories.length && !p.categories.includes(m.category)) s -= 8;
          if (m.spicy > spiceMap[p.spicy]) s -= 18 * (m.spicy - spiceMap[p.spicy]);
          if (p.spicy === "매운거좋아" && m.spicy >= 2) s += 10;
          if (p.meat === "채식선호" && m.meat) s -= 18;
          if (p.meat === "좋아함" && m.meat) s += 6;
          if (budgetMap[p.budget] !== 3 && m.price > budgetMap[p.budget]) s -= 15;
          return Math.max(0, Math.min(100, s));
        });
        const min = Math.min(...scores);
        const avg = scores.reduce((a,b)=>a+b,0) / scores.length;
        return {...m, score: Math.round(min * .4 + avg * .6)};
      }).filter(m=>m.score>0).sort((a,b)=>b.score-a.score);
    }

    function worldcup() {
      const w = state.worldcup;
      if (w.step === "category") return `<div class="screen-head">${backButton()}<h1 class="screen-title" style="text-align:center">🏆 음식 월드컵</h1><p class="screen-sub" style="text-align:center">좋아하는 카테고리를 선택하세요<br>여러 개 선택 가능 · ${w.selected.length}개 선택됨</p></div><div class="grid">${categories.map(cat=>`<button class="press-card" style="background:${w.selected.includes(cat.name)?"var(--primary)":"var(--surface)"};color:${w.selected.includes(cat.name)?"#fff":"var(--foreground)"};position:relative" data-action="worldcup-category" data-value="${cat.name}"><span class="emoji" style="font-size:30px">${cat.emoji}</span><b>${cat.name}</b><span>32개</span></button>`).join("")}</div><button class="button" style="margin-top:24px;background:${w.selected.length?"var(--primary)":"var(--border)"}" data-action="worldcup-next">다음 단계 →</button>`;
      if (w.step === "size") return `<div class="screen-head">${backButton("카테고리 다시 선택")}<h1 class="screen-title" style="text-align:center">🏆 음식 월드컵</h1><p class="screen-sub" style="text-align:center">몇 강으로 진행할까요?</p></div><div class="card" style="margin-bottom:18px"><b>선택한 카테고리</b><div class="wrap" style="margin-top:10px">${w.selected.map(s=>`<span class="badge">${categories.find(c=>c.name===s).emoji} ${s}</span>`).join("")}</div></div><div class="grid">${[16,32].map(n=>`<button class="press-card" style="background:${w.size===n?"var(--primary)":"var(--surface)"};color:${w.size===n?"#fff":"var(--foreground)"}" data-action="worldcup-size" data-value="${n}"><b style="font-size:28px">${n}강</b><span>${n}개 메뉴 대결</span><span>총 ${n-1}번 선택</span></button>`).join("")}</div><div class="stack" style="margin-top:24px"><button class="button" data-action="worldcup-start">🏆 월드컵 시작!</button><button class="button secondary" data-action="worldcup-back-category">← 카테고리 다시 선택</button></div>`;
      if (w.step === "tournament") return worldcupTournament();
      return worldcupResult();
    }

    function worldcupTournament() {
      const m1 = state.worldcup.menus[state.worldcup.match];
      const m2 = state.worldcup.menus[state.worldcup.match + 1];
      const roundName = state.worldcup.menus.length === 2 ? "결승" : `${state.worldcup.menus.length}강`;
      return `<div class="stack-lg"><div><div class="between"><span class="badge">${roundName}</span><span style="font-size:14px;color:var(--muted);font-weight:800">${Math.floor(state.worldcup.match/2)+1} / ${state.worldcup.menus.length/2}</span></div><div class="progress" style="margin-top:8px"><span style="width:${((state.worldcup.match/2+1)/(state.worldcup.menus.length/2))*100}%"></span></div></div><p class="screen-sub" style="text-align:center">더 먹고 싶은 음식을 선택하세요!</p>${worldcupMenuCard(m1,0)}<div style="width:44px;height:44px;border-radius:22px;background:var(--primary);color:#fff;display:grid;place-items:center;font-weight:900;margin:0 auto">VS</div>${worldcupMenuCard(m2,1)}</div>`;
    }

    function worldcupMenuCard(menu, offset) {
      return `<button class="result-card" style="text-align:center" data-action="worldcup-pick" data-index="${state.worldcup.match + offset}"><div style="font-size:42px">${menu.emoji}</div><h2 style="margin:8px 0">${menu.name}</h2><p class="screen-sub">${menu.desc}</p><span class="button" style="margin-top:10px;display:flex;width:auto">선택!</span></button>`;
    }

    function worldcupResult() {
      const c = state.worldcup.champion;
      return `<div style="text-align:center;padding-top:20px"><div style="font-size:60px">🏆</div><h1 class="screen-title">최종 우승!</h1><p class="screen-sub">${state.worldcup.size}강 · ${state.worldcup.selected.join(", ")}</p></div><div class="result-card top" style="text-align:center;margin:20px 0"><div style="font-size:44px">🥇</div><h2 style="font-size:28px;margin:8px 0">${c.name}</h2><p class="screen-sub">${c.desc}</p></div><div class="stack"><button class="button" data-route="restaurants" data-query="${c.name}">이 음식 제공하는 식당 찾기 🍽️</button><button class="button secondary" data-action="worldcup-restart">다시 시작하기</button></div>`;
    }

    function cooking() {
      return `<div class="screen-head">${backButton()}<div style="text-align:center"><div style="font-size:42px">🏠</div><h1 class="screen-title">집밥 모드</h1><p class="screen-sub">오늘은 어떤 방식으로<br>집밥을 준비할까요?</p></div></div><div style="height:1px;background:var(--border);margin-bottom:24px"></div><div class="stack-lg">${cookingCard("fridge","🍳","냉장고 모드","지금 있는 재료로 만들 수 있는 집밥 추천","냉장고에 있는 재료를 선택하면<br>매칭률 높은 레시피를 추천해드려요","#FFF0D6","#F59E0B",["재료 선택","날씨·시간·요일","카테고리 추천","메뉴 추천"])}${cookingCard("shopping","🛒","장보기 모드","먹고 싶은 메뉴를 정하고 장보기 리스트 생성","메뉴를 먼저 정하면<br>마트 동선에 맞는 장보기 리스트를 만들어드려요","#E8F4FD","#3B82F6",["날씨·시간·요일","카테고리 추천","난이도·메뉴 선택","인분 선택","장보기 리스트"])}</div><div class="notice" style="margin-top:28px"><strong>💡 냉장고 모드는 지금 있는 재료로 만들 수 있는 메뉴를,</strong><span>장보기 모드는 먹고 싶은 메뉴의 재료 목록을 알려드려요</span></div>`;
    }

    function cookingCard(routeId, emoji, title, subtitle, desc, bg, border, steps) {
      return `<button class="card" style="text-align:left;background:${bg};border:2px solid ${border}66;border-radius:24px;padding:24px" data-route="${routeId}"><div class="row"><span style="font-size:40px">${emoji}</span><div style="flex:1"><b style="font-size:22px">${title}</b><div style="font-size:13px;color:#555;font-weight:700;margin-top:2px">${subtitle}</div></div><span style="font-size:22px;color:${border}">→</span></div><div style="background:rgba(255,255,255,.62);border-radius:12px;padding:14px;margin:14px 0;color:#333;font-size:14px;line-height:22px;font-weight:600">${desc}</div><div class="wrap">${steps.map(s=>`<span class="badge" style="background:${border};color:#fff">${s}</span>`).join("")}</div></button>`;
    }

    function fridge() {
      const selected = state.fridge.ingredients;
      const groups = [
        ["🥩 메인 재료", [
          ["🥩 육류", ["돼지고기(목살)", "돼지고기(앞다리)", "삼겹살", "다진돼지고기", "소고기(양지)", "소고기(불고기용)", "닭다리살", "닭가슴살", "베이컨"]],
          ["🥫 가공육", ["스팸", "소시지", "햄"]],
          ["🦐 해물류", ["새우", "참치캔", "오징어채(진미채)", "고등어", "어묵"]],
          ["🥬 채소류", ["대파", "양파", "애호박", "감자", "당근", "콩나물", "무", "청양고추", "양배추", "오이", "피망", "상추/로메인/깻잎", "토마토", "아보카도"]],
          ["🍚 곡물·면·밥류", ["밥", "소면", "라면사리", "파스타면", "우동면", "식빵"]],
          ["🫘 두부·콩류", ["두부", "순두부", "베이크드빈"]],
          ["🥚 계란·유제품", ["계란", "모짜렐라치즈", "파마산치즈", "생크림", "플레인요거트", "그릭요거트"]],
          ["🌿 해조류", ["건미역", "다시마", "김가루"]],
          ["🍎 과일·견과", ["제철과일", "옥수수콘", "그래놀라", "견과류"]],
          ["🧄 기타(향신·육수)", ["마늘", "멸치육수", "크루통", "바질", "파슬리", "페퍼론치노"]]
        ]],
        ["🫙 소스·양념", [
          ["🫙 장류", ["고추장", "된장", "국간장", "간장"]],
          ["🧂 가루양념", ["고춧가루", "후추", "설탕", "소금"]],
          ["🫒 오일·액상조미료", ["참기름", "식용유", "올리브유", "굴소스", "식초", "미림", "청주"]],
          ["🍅 소스류", ["케첩", "마요네즈", "머스타드", "시저드레싱", "토마토소스", "발사믹(글레이즈)", "물엿", "꿀"]],
          ["🌱 다진양념", ["다진마늘", "생강"]],
          ["🧈 기타", ["버터", "새우젓", "시나몬가루", "파프리카파우더", "가쓰오부시/가쓰오육수"]]
        ]]
      ];
      return `<div class="screen-head">${backButton("집밥 모드")}<h1 class="screen-title">🍳 냉장고 모드</h1><p class="screen-sub">재료를 선택하면 만들 수 있는 집밥을 추천해드려요</p></div><div class="progress" style="margin-bottom:10px"><span style="width:20%"></span></div><p class="screen-sub" style="text-align:center;margin-bottom:18px">1 / 5</p><h2 class="section-title">냉장고 재료를 선택해주세요</h2><p class="screen-sub" style="margin-bottom:14px">있는 재료를 선택하면 만들 수 있는 메뉴를 찾아드려요</p><div class="notice"><strong>선택한 재료: ${selected.length}개</strong></div><div class="stack-lg">${groups.map(([group, sections]) => `<div><h2 class="section-title">${group}</h2>${sections.map(([section, items]) => `<div style="margin-bottom:16px"><b>${section}</b><div class="wrap" style="margin-top:8px">${items.map(i => `<button class="chip ${selected.includes(i) ? "active" : ""}" data-action="fridge-ingredient" data-value="${i}">${i}</button>`).join("")}</div></div>`).join("")}</div>`).join("")}</div><button class="button" style="margin-top:22px" data-action="toast" data-message="다음 단계 목업입니다">다음 → (${selected.length}개 선택)</button>`;
    }

    function shopping() {
      const selected = state.shopping.weather;
      const options = [["비/흐림","🌧"],["추움","🥶"],["더움/맑음","☀️"],["상관없음 (건너뛰기)",""]];
      return `<div class="screen-head">${backButton("집밥 모드")}<h1 class="screen-title">🛒 장보기 모드</h1><p class="screen-sub">메뉴를 정하면 장보기 리스트를 자동으로 만들어드려요</p></div><div class="progress" style="margin-bottom:10px"><span style="width:14%"></span></div><p class="screen-sub" style="text-align:center;margin-bottom:18px">1 / 7</p><h2 class="section-title">오늘 날씨는 어때요?</h2><p class="screen-sub" style="margin-bottom:16px">날씨에 맞는 집밥 카테고리를 추천해드릴게요</p><div class="grid">${options.map(o => `<button class="press-card ${selected === o[0] ? "active" : ""}" style="background:${selected === o[0] ? "var(--primary)" : "var(--surface)"};color:${selected === o[0] ? "#fff" : "var(--foreground)"}" data-action="shopping-weather" data-value="${o[0]}"><span class="emoji" style="font-size:30px">${o[1]}</span><b>${o[0]}</b></button>`).join("")}</div><button class="button" style="margin-top:24px" data-action="toast" data-message="다음 단계 목업입니다">다음 →</button>`;
    }

    function popular() {
      return `<div class="screen-head">${backButton()}<h1 class="screen-title">⭐ 인기 맛집</h1><p class="screen-sub">동네 최고 인기 맛집 TOP 3</p></div><div class="stack">${samplePlaces.map((p,i)=>placeCard(p,i)).join("")}</div>`;
    }

    function render() {
      renderTabs();
      const screens = {
        home, restaurants, community, calendar, profile,
        custom: customRecommendation,
        consensus,
        worldcup,
        cooking,
        fridge,
        shopping,
        popular
      };
      view.innerHTML = (screens[state.screen] || home)();
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, s => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;" }[s]));
    }

    document.addEventListener("click", (e) => {
      const target = e.target.closest("[data-route],[data-action]");
      if (!target) return;
      const action = target.dataset.action;
      const routeId = target.dataset.route;
      if (routeId) {
        route(routeId, { query: target.dataset.query || "" });
        return;
      }
      if (action === "back") { route(state.previous || "home"); return; }
      if (action === "feedback") {
        if (!FEEDBACK_FORM_URL) {
          toast("구글폼 링크를 연결해야 합니다");
          return;
        }
        window.location.href = FEEDBACK_FORM_URL;
        return;
      }
      if (action === "toast") { toast(target.dataset.message || "동작했습니다"); return; }
      if (action === "sample-map") { toast("카카오맵 연결은 실제 API 연동 시 활성화됩니다"); return; }
      if (action === "restaurant-search") {
        state.restaurantQuery = $("#restaurantInput")?.value || "";
        render();
        return;
      }
      if (action === "restaurant-chip") {
        state.restaurantQuery = target.dataset.value;
        render();
        return;
      }
      if (action === "community-tab") { state.communityTab = target.dataset.value; render(); return; }
      if (action === "allergen") {
        const v = target.dataset.value;
        state.profileAllergens = state.profileAllergens.includes(v) ? state.profileAllergens.filter(x=>x!==v) : [...state.profileAllergens, v];
        render();
        return;
      }
      handleRecommendation(action, target);
      handleConsensus(action, target);
      handleWorldcup(action, target);
      handleCooking(action, target);
    });

    document.addEventListener("change", (e) => {
      if (e.target.classList.contains("consensus-name")) {
        const i = Number(e.target.dataset.index);
        state.consensus.profiles[i].name = e.target.value;
      }
    });

    function handleRecommendation(action, target) {
      const r = state.rec;
      if (action === "rec-weather") { r.weather = target.dataset.value; render(); }
      if (action === "rec-time") { r.time = target.dataset.value; render(); }
      if (action === "rec-day") { r.day = target.dataset.value; render(); }
      if (action === "rec-next") {
        r.step = r.step === "weather" ? "time" : r.step === "time" ? "day" : "result";
        render();
      }
      if (action === "rec-reset") { state.rec = { step: "weather", weather: null, time: null, day: null, category: null, filters: {}, menuIndex: 0 }; render(); }
      if (action === "rec-category") { r.category = target.dataset.value; r.step = "filter"; r.filters = {}; render(); }
      if (action === "rec-filter") { const v = target.dataset.value; r.filters[v] = !r.filters[v]; render(); }
      if (action === "rec-menu") { r.step = "menu"; r.menuIndex = 0; render(); }
      if (action === "rec-next-menu") { r.menuIndex += 1; render(); }
      if (action === "rec-back-filter") { r.step = "filter"; render(); }
      if (action === "rec-back-result") { r.step = "result"; render(); }
    }

    function handleConsensus(action, target) {
      const c = state.consensus;
      const p = c.profiles[c.current];
      if (action === "consensus-count") {
        c.count = Number(target.dataset.value);
        c.profiles = Array.from({length:c.count}, (_,i)=>c.profiles[i] || defaultProfile(i));
        render();
      }
      if (action === "consensus-spicy") { p.spicy = target.dataset.value; render(); }
      if (action === "consensus-meat") { p.meat = target.dataset.value; render(); }
      if (action === "consensus-budget") { p.budget = target.dataset.value; render(); }
      if (action === "consensus-category") {
        const v = target.dataset.value;
        p.categories = p.categories.includes(v) ? p.categories.filter(x=>x!==v) : [...p.categories, v];
        render();
      }
      if (action === "consensus-avoid") {
        const v = target.dataset.value;
        p.avoid = p.avoid.includes(v) ? p.avoid.filter(x=>x!==v) : p.avoid.length < 2 ? [...p.avoid, v] : p.avoid;
        render();
      }
      if (action === "consensus-next") {
        if (c.step === "setup") {
          document.querySelectorAll(".consensus-name").forEach(input => c.profiles[Number(input.dataset.index)].name = input.value);
          c.step = "taste"; c.current = 0;
        } else if (c.step === "taste") {
          if (c.current < c.count - 1) c.current += 1;
          else { c.step = "avoid"; c.current = 0; }
        } else if (c.step === "avoid") {
          if (c.current < c.count - 1) c.current += 1;
          else { c.step = "result"; c.results = calcConsensus(); }
        }
        render();
      }
      if (action === "consensus-prev") {
        if (c.current > 0) c.current -= 1;
        else c.step = c.step === "avoid" ? "taste" : "setup";
        render();
      }
      if (action === "consensus-restart") {
        state.consensus = { step: "setup", count: 2, current: 0, profiles: [], results: [] };
        render();
      }
    }

    function handleWorldcup(action, target) {
      const w = state.worldcup;
      if (action === "worldcup-category") {
        const v = target.dataset.value;
        w.selected = w.selected.includes(v) ? w.selected.filter(x=>x!==v) : [...w.selected, v];
        render();
      }
      if (action === "worldcup-next") {
        if (!w.selected.length) { toast("카테고리를 하나 이상 선택하세요"); return; }
        w.step = "size"; render();
      }
      if (action === "worldcup-size") { w.size = Number(target.dataset.value); render(); }
      if (action === "worldcup-back-category") { w.step = "category"; render(); }
      if (action === "worldcup-start") {
        let pool = w.selected.flatMap(cat => menuBank[cat].map((name, i)=>({ name, category: cat, emoji: categories.find(c=>c.name===cat).emoji, desc: `${cat} 대표 메뉴입니다.` })));
        pool = pool.sort(() => Math.random() - .5).slice(0, w.size);
        if (pool.length < w.size) pool = [...pool, ...pool].slice(0, w.size);
        w.menus = pool; w.match = 0; w.winners = []; w.champion = null; w.step = "tournament"; render();
      }
      if (action === "worldcup-pick") {
        w.winners.push(w.menus[Number(target.dataset.index)]);
        w.match += 2;
        if (w.match >= w.menus.length) {
          if (w.winners.length === 1) { w.champion = w.winners[0]; w.step = "result"; }
          else { w.menus = w.winners; w.winners = []; w.match = 0; }
        }
        render();
      }
      if (action === "worldcup-restart") {
        state.worldcup = { step: "category", selected: [], size: 16, menus: [], match: 0, winners: [], champion: null };
        render();
      }
    }

    function handleCooking(action, target) {
      if (action === "fridge-ingredient") {
        const v = target.dataset.value;
        state.fridge.ingredients = state.fridge.ingredients.includes(v) ? state.fridge.ingredients.filter(x=>x!==v) : [...state.fridge.ingredients, v];
        render();
      }
      if (action === "shopping-menu") { state.shopping.selected = target.dataset.value; render(); }
      if (action === "shopping-people") { state.shopping.people = Number(target.dataset.value); render(); }
      if (action === "shopping-weather") { state.shopping.weather = target.dataset.value; render(); }
    }

    window.addEventListener("hashchange", () => {
      state.screen = location.hash.replace("#", "") || "home";
      render();
    });

    render();
  </script>
</body>
</html>
