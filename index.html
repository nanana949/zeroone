<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메뉴메이트</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css">
<style>
  :root{
    --primary:#FF5C8A;
    --primary-2:#FF9166;
    --secondary:#6C5CE7;
    --accent:#FFD166;
    --background:#FFF9F6;
    --surface:#FFFFFF;
    --foreground:#16121F;
    --muted:#847D95;
    --border:rgba(22,18,31,0.08);
    --success:#00C2A8;
    --warning:#FF9F1C;
    --error:#FF4D6D;
    --grad: linear-gradient(135deg, var(--primary), var(--primary-2));
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 8% 4%, rgba(255,92,138,0.20), transparent 40%),
      radial-gradient(circle at 95% 12%, rgba(108,92,231,0.18), transparent 38%),
      radial-gradient(circle at 20% 96%, rgba(255,209,102,0.20), transparent 42%),
      radial-gradient(circle at 90% 90%, rgba(0,194,168,0.14), transparent 40%),
      #FDF7F2;
    min-height:100vh;
    font-family:'Pretendard Variable','Pretendard',-apple-system,'Malgun Gothic',sans-serif;
    color:var(--foreground);
    display:flex; justify-content:center; align-items:flex-start;
    padding:28px 12px;
  }
  button{font-family:inherit;}

  /* ---------- app shell ---------- */
  #phone{
    width:100%; max-width:420px;
    height:860px; max-height:92vh;
    background:var(--background);
    border-radius:36px;
    overflow:hidden;
    position:relative;
    box-shadow: 0 40px 70px -30px rgba(255,92,138,0.35), 0 10px 30px -12px rgba(22,18,31,0.15);
    display:flex; flex-direction:column;
  }
  #screen-stack{ position:relative; flex:1; min-height:0; }
  .tabview, .overlay{
    position:absolute; inset:0;
    overflow-y:auto; -webkit-overflow-scrolling:touch;
    background:var(--background);
  }
  .tabview{display:none;}
  .tabview.active{display:block;}
  .overlay{
    display:none;
    background:var(--background);
    animation: slideIn .28s ease;
  }
  .overlay.active{display:block;}
  @keyframes slideIn{ from{transform:translateX(24px); opacity:0;} to{transform:translateX(0); opacity:1;} }

  .content{ padding:18px 16px 100px; }

  /* ---------- overlay header ---------- */
  .ov-header{
    position:sticky; top:0; z-index:5;
    display:flex; align-items:center; gap:10px;
    padding:16px; background:rgba(255,249,246,0.85); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
    border-bottom:1px solid var(--border);
  }
  .back-btn{
    width:36px;height:36px;border-radius:14px;border:none;
    background:var(--surface); color:var(--foreground);
    font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 10px -4px rgba(22,18,31,0.18);
  }
  .ov-title{font-size:17px; font-weight:900; letter-spacing:-0.2px;}

  /* ---------- home ---------- */
  .header-card{
    background:var(--grad); border-radius:28px; padding:26px; margin-bottom:18px;
    box-shadow:0 16px 30px -14px rgba(255,92,138,0.55);
    position:relative; overflow:hidden;
    display:flex; align-items:center; justify-content:space-between; gap:12px;
  }
  .header-card::after{
    content:""; position:absolute; top:-40%; right:-20%; width:180px; height:180px; border-radius:50%;
    background:rgba(255,255,255,0.18);
    pointer-events:none;
  }
  .header-copy{position:relative; z-index:1; min-width:0;}
  .header-card h1{margin:0; font-size:30px; font-weight:900; color:#fff; letter-spacing:-0.8px; position:relative;}
  .header-card p{margin:5px 0 0; font-size:13.5px; color:rgba(255,255,255,0.92); font-weight:600; position:relative;}
  .feedback-btn{
    position:relative; z-index:2; flex:0 0 auto;
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    min-height:38px; padding:0 12px;
    border:1px solid rgba(255,255,255,0.58); border-radius:999px;
    background:rgba(255,255,255,0.18); color:#fff; text-decoration:none;
    font-size:11.5px; font-weight:900; line-height:1; white-space:nowrap;
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.18);
  }
  .feedback-btn:active{opacity:.82; transform:scale(.98);}
  @media (max-width:360px){
    .header-card{padding:22px; gap:8px;}
    .header-card h1{font-size:25px;}
    .feedback-btn{min-height:34px; padding:0 10px; font-size:10.5px;}
  }

  .banner{
    background:rgba(255,92,138,0.08); border:1.5px solid rgba(255,92,138,0.18);
    padding:13px 15px; border-radius:16px; margin-bottom:18px;
  }
  .banner .t1{font-size:13.5px; font-weight:800; color:var(--foreground); line-height:1.4;}
  .banner .t2{font-size:12px; font-weight:500; color:var(--muted); margin-top:5px; line-height:1.4;}

  .quote-card{
    background:var(--surface); border:1.5px solid var(--border); border-radius:28px;
    padding:28px; margin-bottom:26px; text-align:center;
    min-height:150px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px;
    box-shadow:0 20px 40px -24px rgba(22,18,31,0.18);
  }
  .quote-card .em{font-size:52px;}
  .quote-card .qt{font-size:17px; font-weight:800; line-height:1.5; letter-spacing:.2px;}

  .section-title{font-size:17px; font-weight:900; margin:6px 0 12px; letter-spacing:-0.3px;}

  .mode-grid, .feat-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:24px;}
  .mode-card, .feat-card{
    border:none; border-radius:24px; padding:18px; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px;
    text-align:center; min-height:124px; position:relative; overflow:hidden;
    box-shadow:0 14px 24px -16px rgba(22,18,31,0.35);
    transition:transform .15s cubic-bezier(.2,.8,.3,1);
  }
  .mode-card:active, .feat-card:active{transform:scale(0.95);}
  .mode-card .em, .feat-card .em{font-size:34px; margin-bottom:2px; filter:drop-shadow(0 4px 6px rgba(0,0,0,0.12));}
  .mode-card .lb, .feat-card .lb{font-size:13.5px; font-weight:900; color:var(--foreground);}
  .mode-card .de, .feat-card .de{font-size:10.5px; font-weight:600; color:var(--foreground); opacity:0.55; margin-top:1px;}

  /* ---------- generic ---------- */
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:12.5px; font-weight:800; color:var(--muted); margin-bottom:7px;}
  .chip-row{display:flex; flex-wrap:wrap; gap:7px;}
  .chip-row.scroll{flex-wrap:nowrap; overflow-x:auto; -webkit-overflow-scrolling:touch; padding-bottom:2px; scrollbar-width:none;}
  .chip-row.scroll::-webkit-scrollbar{display:none;}
  .chip-row.scroll .chip{flex:none;}
  .chip{padding:9px 14px; border-radius:999px; border:1.5px solid var(--border); background:var(--surface); font-size:13px; font-weight:600; color:var(--foreground); cursor:pointer; transition:transform .1s ease;}
  .chip:active{transform:scale(0.95);}
  .chip.selected{background:var(--grad); border-color:transparent; color:#fff; font-weight:800; box-shadow:0 8px 16px -8px rgba(255,92,138,0.6);}
  textarea, input[type=text]{
    width:100%; border:1.5px solid var(--border); background:var(--surface); border-radius:16px;
    padding:13px 14px; font-size:14px; font-family:inherit; color:var(--foreground); resize:vertical;
  }
  textarea:focus, input:focus{outline:2px solid var(--primary); outline-offset:1px;}
  .btn{
    width:100%; padding:16px; border-radius:18px; border:none; background:var(--grad); color:#fff;
    font-size:15px; font-weight:800; cursor:pointer; box-shadow:0 14px 24px -10px rgba(255,92,138,0.55);
    transition:transform .12s cubic-bezier(.2,.8,.3,1);
  }
  .btn:active{transform:scale(0.97);}
  .btn.ghost{background:var(--surface); color:var(--muted); box-shadow:none; border:1.5px solid var(--border);}
  .btn.secondary{background:linear-gradient(135deg, var(--secondary), #9B8CFF); box-shadow:0 14px 24px -10px rgba(108,92,231,0.5);}

  .card{background:var(--surface); border:1.5px solid var(--border); border-radius:22px; padding:18px; margin-bottom:12px; box-shadow:0 16px 30px -22px rgba(22,18,31,0.25);}
  .menu-name{font-size:17px; font-weight:800;}
  .menu-meta{font-size:11.5px; color:var(--muted); margin-top:3px; font-weight:700;}
  .menu-reason{font-size:13px; color:#5b5468; margin-top:7px; line-height:1.55;}
  .tag{display:inline-block; padding:4px 10px; border-radius:999px; background:rgba(255,92,138,0.12); color:var(--primary); font-size:10.5px; font-weight:800; margin:2px 4px 0 0;}

  .empty-note{text-align:center; color:var(--muted); font-size:13px; padding:40px 20px;}

  /* ---------- floating glass tab bar ---------- */
  #tabbar{
    flex:none; display:flex; gap:2px;
    background:rgba(255,255,255,0.75); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.6);
    border-radius:999px;
    margin:0 14px calc(env(safe-area-inset-bottom,0px) + 14px);
    padding:7px;
    box-shadow:0 20px 40px -18px rgba(22,18,31,0.35);
    position:relative; z-index:8;
  }
  .tabbtn{
    flex:1; background:none; border:none; border-radius:999px; display:flex; flex-direction:column; align-items:center; gap:1px;
    padding:8px 2px; cursor:pointer; color:var(--muted); transition:background .15s ease, color .15s ease;
  }
  .tabbtn .ic{font-size:19px;}
  .tabbtn .lb{font-size:9.5px; font-weight:800;}
  .tabbtn.active{color:#fff; background:var(--grad); box-shadow:0 8px 16px -8px rgba(255,92,138,0.55);}

  /* ---------- worldcup ---------- */
  .wc-vs{display:flex; align-items:center; justify-content:center; gap:10px; margin:8px 0 18px; color:var(--muted); font-weight:900; font-size:12px;}
  .wc-pair{display:flex; flex-direction:column; gap:14px;}
  .wc-card{
    border:none; border-radius:26px; background:var(--surface); border:2px solid var(--border);
    padding:24px 16px; text-align:center; cursor:pointer;
    box-shadow:0 16px 30px -20px rgba(22,18,31,0.25);
    transition:transform .12s ease, border-color .12s ease;
  }
  .wc-card:active{transform:scale(0.96); border-color:var(--primary);}
  .wc-card.picked{border-color:var(--primary); background:rgba(255,92,138,0.08); box-shadow:0 0 0 3px rgba(255,92,138,0.15);}
  .wc-card .nm{font-size:19px; font-weight:900;}
  .wc-card .ct{font-size:12px; color:var(--muted); margin-top:4px; font-weight:600;}
  .progress-track{height:6px; border-radius:999px; background:var(--border); overflow:hidden; margin-bottom:6px;}
  .progress-fill{height:100%; background:var(--grad); transition:width .3s ease;}
  .round-badge{display:inline-block; padding:5px 13px; border-radius:999px; background:rgba(255,92,138,0.12); color:var(--primary); font-size:11.5px; font-weight:800; margin-bottom:10px;}

  /* ---------- consensus ---------- */
  .member-card{background:var(--surface); border:1.5px solid var(--border); border-radius:18px; padding:14px; margin-bottom:10px; position:relative; box-shadow:0 10px 20px -16px rgba(22,18,31,0.2);}
  .member-card .rm{position:absolute; top:10px; right:10px; background:none; border:none; color:var(--muted); font-size:16px; cursor:pointer;}
  .conflict-row{display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-bottom:1px dashed var(--border); font-size:13px;}
  .status-dot{width:8px;height:8px;border-radius:50%; display:inline-block; margin-right:6px;}

  .cal-day{display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid var(--border);}
  .cal-day:last-child{border-bottom:none;}
  .cal-dow{width:34px; text-align:center; font-weight:900; font-size:13px; color:var(--primary);}

  .hist-row{display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--border); align-items:baseline;}
  .hist-row:last-child{border-bottom:none;}
  /* ---------- custom recommendation quiz (capsule) ---------- */
  .qz-dots{display:flex; gap:6px; justify-content:center; margin-bottom:20px;}
  .qz-dot{width:7px; height:7px; border-radius:50%; background:var(--border); transition:all .3s ease;}
  .qz-dot.filled{width:18px; border-radius:4px; background:var(--accent, var(--primary));}
  .qz-title{font-size:20px; font-weight:900; text-align:center; margin-bottom:22px; letter-spacing:-0.3px;}
  .qz-opt{display:flex; align-items:center; gap:10px; border:2px solid var(--border); background:var(--surface); border-radius:18px; padding:14px 16px; margin-bottom:9px; cursor:pointer; font-size:14.5px; font-weight:700; color:var(--foreground); width:100%; text-align:left; transition:transform .12s ease, border-color .12s ease, background .12s ease; box-shadow:0 10px 20px -18px rgba(22,18,31,0.3);}
  .qz-opt:active{transform:scale(0.97);}
  .qz-opt.picked{color:#fff;}
  .qz-opt .em{font-size:20px;}
  .qz-stage{position:relative;}
  .qz-anim-out{animation: qzOutLeft .22s ease forwards;}
  .qz-anim-in{animation: qzInRight .28s ease;}
  @keyframes qzOutLeft{ to{ transform:translateX(-18px); opacity:0; } }
  @keyframes qzInRight{ from{ transform:translateX(18px); opacity:0; } to{ transform:translateX(0); opacity:1; } }
  .qz-capsule-wrap{display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px 0; position:relative;}
  .qz-capsule{position:relative; width:110px; height:110px;}
  .qz-cap-half{position:absolute; left:0; width:110px; height:55px; overflow:hidden;}
  .qz-cap-half.top{top:0; border-radius:55px 55px 0 0;}
  .qz-cap-half.bottom{bottom:0; border-radius:0 0 55px 55px;}
  .qz-cap-half .fill{position:absolute; width:110px; height:110px;}
  .qz-cap-half.top .fill{top:0; background:linear-gradient(160deg, #FF6B9D, #B99AF5);}
  .qz-cap-half.bottom .fill{bottom:0; background:var(--surface); border:2px solid var(--border); border-top:none;}
  .qz-cap-shine{position:absolute; top:10px; left:16px; width:20px; height:32px; border-radius:50%; background:rgba(255,255,255,0.55); transform:rotate(-18deg);}
  .qz-capsule.shaking{animation: qzShake .55s ease-in-out;}
  @keyframes qzShake{ 0%,100%{transform:translateX(0) rotate(0);} 15%{transform:translateX(-6px) rotate(-5deg);} 30%{transform:translateX(6px) rotate(5deg);} 45%{transform:translateX(-5px) rotate(-4deg);} 60%{transform:translateX(5px) rotate(4deg);} 75%{transform:translateX(-3px) rotate(-2deg);} 90%{transform:translateX(2px) rotate(1deg);} }
  .qz-capsule.cracking .qz-cap-half.top{animation: qzCrackUp .5s ease forwards;}
  .qz-capsule.cracking .qz-cap-half.bottom{animation: qzCrackDown .5s ease forwards;}
  @keyframes qzCrackUp{ to{ transform:translateY(-55px) rotate(-20deg); opacity:0; } }
  @keyframes qzCrackDown{ to{ transform:translateY(55px) rotate(20deg); opacity:0; } }
  .qz-confetti-layer{position:absolute; inset:0; pointer-events:none; overflow:visible;}
  .qz-confetti{position:absolute; top:50%; left:50%; width:8px; height:8px; border-radius:2px; opacity:0;}
  .qz-confetti.pop{animation: qzConfettiPop .9s cubic-bezier(.2,.7,.3,1) forwards;}
  @keyframes qzConfettiPop{
    0%{ opacity:1; transform:translate(-50%,-50%) scale(0.6); }
    100%{ opacity:0; transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) rotate(var(--rot)) scale(1); }
  }
  .qz-drawing-label{margin-top:16px; font-size:13px; font-weight:700; color:var(--muted);}
  .qz-result{animation: qzResultPop .4s cubic-bezier(.2,.8,.25,1);}
  @keyframes qzResultPop{ from{ transform:scale(0.88); opacity:0; } to{ transform:scale(1); opacity:1; } }
  /* ---------- nearby restaurant search (Kakao Local API via backend) ---------- */
  .map-link-row{display:flex; gap:8px; margin-top:12px; padding-top:12px; border-top:1px dashed var(--border);}
  .map-link-btn{flex:1; padding:11px; border-radius:14px; border:1.5px solid var(--border); background:var(--surface); color:var(--foreground); font-weight:800; font-size:12.5px; cursor:pointer; transition:transform .12s ease, border-color .12s ease, background .12s ease;}
  .map-link-btn:active{transform:scale(0.96);}
  .map-link-btn[data-svc="kakao"]:active, .map-link-btn[data-svc="kakao"]:hover{border-color:#FFCD00; background:rgba(255,205,0,0.1);}
  .map-link-btn[data-svc="naver"]:active, .map-link-btn[data-svc="naver"]:hover{border-color:#03C75A; background:rgba(3,199,90,0.08);}

  /* ---------- micro-interactions: reveal, stagger, tab fade, spinner ---------- */
  .reveal{animation: revealUp .45s cubic-bezier(.2,.8,.25,1) both;}
  @keyframes revealUp{ from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);} }
  .stagger > *{animation: revealUp .45s cubic-bezier(.2,.8,.25,1) both;}
  .stagger > *:nth-child(1){animation-delay:.03s;}
  .stagger > *:nth-child(2){animation-delay:.09s;}
  .stagger > *:nth-child(3){animation-delay:.15s;}
  .stagger > *:nth-child(4){animation-delay:.21s;}
  .stagger > *:nth-child(5){animation-delay:.27s;}
  .stagger > *:nth-child(n+6){animation-delay:.3s;}
  .tabview.active{animation: tabFade .32s cubic-bezier(.2,.8,.25,1);}
  @keyframes tabFade{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }
  .spin-dot{display:inline-flex; gap:4px; vertical-align:middle;}
  .spin-dot span{width:5px; height:5px; border-radius:50%; background:var(--primary); animation: spinDot 1s ease-in-out infinite;}
  .spin-dot span:nth-child(2){animation-delay:.15s;}
  .spin-dot span:nth-child(3){animation-delay:.3s;}
  @keyframes spinDot{ 0%,80%,100%{opacity:.25; transform:scale(0.7);} 40%{opacity:1; transform:scale(1);} }
  .wc-fade-out{animation: wcFadeOut .18s ease forwards;}
  .wc-fade-in{animation: revealUp .32s cubic-bezier(.2,.8,.25,1);}
  @keyframes wcFadeOut{ to{opacity:0; transform:scale(0.97);} }
  .confirm-pop{animation: confirmPop .5s cubic-bezier(.2,.8,.25,1) both;}
  @keyframes confirmPop{ 0%{opacity:0; transform:scale(0.9);} 60%{transform:scale(1.02);} 100%{opacity:1; transform:scale(1);} }

  /* ---------- home cooking mode ---------- */
  .hc-step-label{font-size:11px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:4px;}
  .hc-big-title{font-size:20px; font-weight:900; margin-bottom:18px; letter-spacing:-0.3px;}
  .score-row{display:flex; align-items:center; gap:10px; margin-bottom:10px; cursor:pointer; padding:12px 14px; border-radius:16px; border:2px solid var(--border); background:var(--surface); transition:border-color .15s ease, transform .12s ease;}
  .score-row:active{transform:scale(0.98);}
  .score-row.top{border-color:var(--primary); background:rgba(255,92,138,0.06);}
  .score-row .sr-label{width:92px; font-weight:800; font-size:13.5px; flex:none;}
  .score-row .sr-track{flex:1; height:10px; border-radius:999px; background:var(--border); overflow:hidden;}
  .score-row .sr-fill{height:100%; background:var(--grad); border-radius:999px; transition:width .5s cubic-bezier(.2,.8,.25,1);}
  .score-row .sr-badge{font-size:10px; font-weight:900; color:var(--primary); flex:none; width:34px; text-align:right;}
  .hc-mode-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:6px;}
  .hc-mode-card{border:none; border-radius:26px; padding:26px 14px; cursor:pointer; text-align:center; box-shadow:0 18px 34px -18px rgba(22,18,31,0.4); transition:transform .15s cubic-bezier(.2,.8,.3,1), box-shadow .15s ease; position:relative; overflow:hidden;}
  .hc-mode-card:active{transform:scale(0.95);}
  .hc-mode-card::after{content:""; position:absolute; top:-30%; right:-15%; width:120px; height:120px; border-radius:50%; background:rgba(255,255,255,0.16);}
  .hc-mode-card[data-hcmode="fridge"]{background:linear-gradient(135deg, #5DDDC0, #34B4A8);}
  .hc-mode-card[data-hcmode="shopping"]{background:linear-gradient(135deg, #FFB84D, #FF8A5C);}
  .hc-mode-card .em{font-size:40px; display:block; margin-bottom:10px; position:relative; filter:drop-shadow(0 4px 8px rgba(0,0,0,0.15));}
  .hc-mode-card .lb{font-weight:900; font-size:15.5px; display:block; color:#fff; position:relative;}
  .hc-mode-card .de{font-size:11px; color:rgba(255,255,255,0.85); opacity:1; margin-top:5px; display:block; line-height:1.5; position:relative; font-weight:600;}
  .ing-group-title{font-size:12.5px; font-weight:800; color:var(--muted); margin:16px 0 8px;}
  .ing-group-title:first-child{margin-top:0;}
  .match-badge{display:inline-flex; align-items:center; gap:4px; padding:4px 10px; border-radius:999px; font-size:11px; font-weight:900; color:#fff;}
  .match-badge.high{background:var(--success);}
  .match-badge.mid{background:var(--warning);}
  .match-badge.low{background:var(--muted);}
  .missing-note{font-size:12px; color:var(--primary); font-weight:700; margin-top:6px;}

/* ================= persistence ================= */
async function loadState(){
  try{ const p = await window.storage.get(STORAGE_PROFILE_KEY); if(p && p.value) profile = {...profile, ...JSON.parse(p.value)}; }catch(e){}
  try{ const h = await window.storage.get(STORAGE_HISTORY_KEY); if(h && h.value) history = JSON.parse(h.value); }catch(e){}
}
async function saveProfile(){ try{ await window.storage.set(STORAGE_PROFILE_KEY, JSON.stringify(profile)); }catch(e){} }
async function addHistory(entry){
  history.unshift({...entry, ts: Date.now()});
  history = history.slice(0, 30);
  try{ await window.storage.set(STORAGE_HISTORY_KEY, JSON.stringify(history)); }catch(e){}
  bumpCommunityMenuCount(entry.menu);
}
async function clearHistory(){ history = []; try{ await window.storage.set(STORAGE_HISTORY_KEY, JSON.stringify(history)); }catch(e){} renderProfile(); renderCommunity(); }

/* ---------- shared community data (visible to all users of this app) ---------- */
async function bumpCommunityMenuCount(menuName){
  let counts = {};
  try{
    const r = await window.storage.get('community:menucounts', true);
    if(r && r.value) counts = JSON.parse(r.value);
  }catch(e){ /* key doesn't exist yet, start fresh */ }
  counts[menuName] = (counts[menuName]||0)+1;
  try{ await window.storage.set('community:menucounts', JSON.stringify(counts), true); }catch(e){}
}
async function loadCommunityMenuCounts(){
  try{ const r = await window.storage.get('community:menucounts', true); return (r&&r.value)?JSON.parse(r.value):{}; }catch(e){ return {}; }
}
async function loadCommunityTips(){
  try{ const r = await window.storage.get('community:tips', true); return (r&&r.value)?JSON.parse(r.value):[]; }catch(e){ return []; }
}
async function addCommunityTip(menu, place, note){
  const tips = await loadCommunityTips();
  tips.unshift({menu, place, note, ts: Date.now()});
  const trimmed = tips.slice(0,50);
  try{ await window.storage.set('community:tips', JSON.stringify(trimmed), true); }catch(e){}
  return trimmed;
}

function passesAvoidFilter(menu, avoidText, excludes){
  const hay = (menu.name+' '+menu.reason+' '+menu.pair);
  if(avoidText){
    const kws = avoidText.split(/[,\s]+/).map(s=>s.trim()).filter(Boolean);
    if(kws.some(k => hay.includes(k))) return false;
  }
  if(excludes && excludes.length){
    if(excludes.some(k => menu.diet && menu.diet[k])) return false;
  }
  return true;
}
function scoreForProfile(menu, profile){
  let score = Math.random()*6;
  score += (3 - Math.abs(menu.budget-BUDGET_TIER[profile.budget]))*10;
  score += (3 - Math.abs(menu.spicy-SPICE_TIER[profile.spice]))*8;
  if((profile.companion==='가족'||profile.companion==='회사동료') && menu.hunger===3) score+=8;
  if(profile.companion==='혼자' && menu.hunger!==3) score+=5;
  if(profile.companion==='연인' && menu.hunger!==1) score+=3;
  return score;
}

/* ================= consensus algorithm (rebuilt on the real MENU_DATABASE) ================= */
let consensusMembers = [];
let consensusFormExcludes = [];
let consensusFormWant = null;
let consensusFormBudget = '보통';
let consensusFormSpice = '보통';
const CONSENSUS_WANT_OPTS = ['위로','기분전환','스트레스해소','활력충전','편안함','특별함','도전','자기관리','축하'];
function calculateConsensus(members){
  if(!members.length) return { recommendations:[], conflictMap:[] };
  const minBudgetTier = Math.min(...members.map(m=>BUDGET_TIER[m.budget]));
  const minSpiceTier = Math.min(...members.map(m=>SPICE_TIER[m.spice]));
  const allExcludes = [...new Set(members.flatMap(m=>m.excludes))];

  const scored = [];
  for(const menu of MENU_DATABASE){
    if(allExcludes.some(k => menu.diet && menu.diet[k])) continue;
    if(menu.budget > minBudgetTier) continue;

    let score = 50;
    const reasons = [];

    if(menu.spicy <= minSpiceTier){ score += 20; reasons.push('다들 부담없이 먹을 수 있는 맵기예요'); }
    else if(menu.spicy === minSpiceTier+1){ score += 4; }
    else { score -= 18; reasons.push('맵기에 예민한 멤버에겐 조금 매울 수 있어요'); }

    let wantMatches = 0;
    members.forEach(m=>{ if(m.want && menu.mood && menu.mood.includes(m.want)) wantMatches++; });
    if(wantMatches>0){ score += wantMatches*12; reasons.push(`${wantMatches}명이 원했던 느낌과 잘 맞아요`); }

    if(menu.budget < minBudgetTier){ score += 10; reasons.push('예산에 여유가 있어요'); }
    else reasons.push('예산 안에 딱 맞아요');

    score += Math.random()*4;
    scored.push({ menu, score, reasons });
  }
  scored.sort((a,b)=>b.score-a.score);
  const recommendations = scored.slice(0,5);

  const conflictMap = recommendations.map(r=>{
    let okCount = 0;
    members.forEach(m=>{
      const excludeOk = !m.excludes.some(k=>r.menu.diet && r.menu.diet[k]);
      const budgetOk = r.menu.budget <= BUDGET_TIER[m.budget];
      if(excludeOk && budgetOk) okCount++;
    });
    const ratio = okCount/members.length;
    const status = ratio===1?'all_ok':(ratio>=0.7?'mostly_ok':'conflict');
    return { menuName:r.menu.name, status, okCount, total:members.length };
  });

  return { recommendations, conflictMap };
}

function customScore(menu){
  let score = Math.random()*8;
  const HUNGER_TIER2 = {'가벼움':1,'보통':2,'든든함':3};
  score += (3 - Math.abs(menu.hunger - (HUNGER_TIER2[customAnswers.hunger]||2)))*8;
  score += (3 - Math.abs(menu.spicy - SPICE_TIER[customAnswers.spice]))*10;
  score += (3 - Math.abs(menu.budget - BUDGET_TIER[customAnswers.budget]))*10;
  if((customAnswers.companion==='가족'||customAnswers.companion==='회사동료') && menu.hunger===3) score+=8;
  if(customAnswers.companion==='혼자' && menu.hunger!==3) score+=5;
  const moodTags = MOOD_MAP[customAnswers.mood] || [];
  if(menu.mood && menu.mood.some(m=>moodTags.includes(m))) score += 16;
  return score;
}
function customDrawMenu(){

function qzBurstConfetti(){
  const layer = document.getElementById('qz-confetti-layer');
  if(!layer) return;
  const colors = QZ_ACCENTS.map(a=>QZ_ACCENT_HEX[a]);
  for(let i=0;i<26;i++){
    const p = document.createElement('div');
    p.className = 'qz-confetti';
    const angle = Math.random()*Math.PI*2;
    const dist = 70 + Math.random()*90;
    p.style.setProperty('--dx', Math.cos(angle)*dist+'px');
    p.style.setProperty('--dy', Math.sin(angle)*dist - 30+'px');
    p.style.setProperty('--rot', (Math.random()*360)+'deg');
    p.style.background = colors[i%colors.length];
    p.style.borderRadius = Math.random()>0.5 ? '50%' : '2px';
    layer.appendChild(p);
    requestAnimationFrame(()=> p.classList.add('pop'));
    setTimeout(()=> p.remove(), 950);
  }
}

/* ================= CALENDAR (meal log + health insights) ================= */
function isCarbHeavy(m){
  if(m.diet.gluten) return true;
  return /밥|죽|면|빵|떡|파스타|국수|동$/.test(m.name);
}
function computeHealthInsights(){
  const weekAgo = Date.now() - 7*86400000;
  const recent = history.filter(h=>h.ts>=weekAgo)
    .map(h=>({...h, m:MENU_DATABASE.find(x=>x.name===h.menu)}))
    .filter(h=>h.m);
  if(recent.length < 3) return null;
  const insights = [];
  const spicyCount = recent.filter(h=>h.m.spicy>=3).length;
  if(spicyCount/recent.length >= 0.5) insights.push({icon:'🌶️', text:`최근 매운 음식 비중이 높았어요 (${spicyCount}/${recent.length}번)`});
  const uniqueCats = new Set(recent.map(h=>h.m.category));
  if(uniqueCats.size >= 5) insights.push({icon:'🌈', text:`최근 ${uniqueCats.size}가지 카테고리를 다양하게 드셨어요`});
  else if(uniqueCats.size <= 2 && recent.length>=4) insights.push({icon:'🔁', text:`최근 비슷한 종류가 반복됐어요, 색다른 메뉴는 어때요?`});
  const healthyCount = recent.filter(h=>h.m.category==='건강식').length;
  if(healthyCount>0) insights.push({icon:'🥗', text:`건강식을 ${healthyCount}번 챙겨 드셨어요`});
  let maxStreak=1, curStreak=1;
  for(let i=1;i<recent.length;i++){
    if(recent[i].m.category===recent[i-1].m.category){ curStreak++; maxStreak=Math.max(maxStreak,curStreak); }
    else curStreak=1;
  }
  if(maxStreak>=3){
    const streakCat = recent[0].m.category;
    insights.push({icon:'👀', text:`${streakCat} 종류가 ${maxStreak}번 연속이었어요`});
  }
  const heavyCount = recent.filter(h=>h.m.hunger===3).length;
  if(heavyCount/recent.length >= 0.6) insights.push({icon:'🍚', text:`든든한 음식 위주였어요, 가벼운 한끼도 한번 챙겨보세요`});
  const carbCount = recent.filter(h=>isCarbHeavy(h.m)).length;
  if(carbCount/recent.length >= 0.6) insights.push({icon:'🍞', text:`면·밥·빵 같은 탄수화물 위주 메뉴 비중이 높았어요 (${carbCount}/${recent.length}번)`});
  const proteinCount = recent.filter(h=>h.m.diet.pork||h.m.diet.beef||h.m.diet.seafood||h.m.diet.egg).length;
  if(proteinCount/recent.length < 0.35 && recent.length>=4) insights.push({icon:'🥚', text:`고기·계란·해산물 같은 단백질 메뉴가 적었어요`});
  else if(proteinCount/recent.length >= 0.4 && carbCount/recent.length < 0.6) insights.push({icon:'⚖️', text:`탄수화물과 단백질을 골고루 챙기셨어요`});
  return insights;
}

function roundLabel(count){

function startWorldcup(size){
  const pool = wcCategory ? MENU_DATABASE.filter(m=>m.category===wcCategory) : MENU_DATABASE;
  const shuffled = [...pool].sort(()=>Math.random()-0.5).slice(0, size);
  wc = { items:shuffled, matches:buildMatches(shuffled), matchIndex:0, winners:[], champion:null };
  renderWorldcupMatch();
}
function renderWorldcupMatch(){
  const el = document.getElementById('worldcup-content');
  const [a,b] = wc.matches[wc.matchIndex];
  const progress = Math.round((wc.matchIndex/wc.matches.length)*100);
  el.innerHTML = `
    <div class="wc-fade-in">
      <div class="round-badge">${roundLabel(wc.items.length)} · ${wc.matchIndex+1}/${wc.matches.length}</div>
      <div class="progress-track"><div class="progress-fill" style="width:${progress}%"></div></div>
      <div style="height:16px;"></div>
      <div class="wc-pair">
        <button class="wc-card" data-pick="a"><div class="nm">${a.name}</div><div class="ct">${a.category} · ${BUDGET_LABEL[a.budget]}</div></button>
        <div class="wc-vs">VS</div>
        <button class="wc-card" data-pick="b"><div class="nm">${b.name}</div><div class="ct">${b.category} · ${BUDGET_LABEL[b.budget]}</div></button>
      </div>
    </div>
  `;
  el.querySelector('[data-pick="a"]').addEventListener('click', ()=>selectWc(a, 'a'));
  el.querySelector('[data-pick="b"]').addEventListener('click', ()=>selectWc(b, 'b'));
}
function selectWc(winner, side){
  const el = document.getElementById('worldcup-content');
  const picked = el.querySelector(`[data-pick="${side}"]`);
  const other = el.querySelector(`[data-pick="${side==='a'?'b':'a'}"]`);
  if(picked) picked.classList.add('picked');
  if(other) other.style.opacity = '0.35';
  el.querySelectorAll('.wc-card').forEach(c=> c.style.pointerEvents='none');
  wc.winners.push(winner);
  wc.matchIndex++;
  setTimeout(()=>{
    const wrap = el.querySelector('.wc-fade-in') || el.firstElementChild;
    if(wrap) wrap.classList.add('wc-fade-out');
    setTimeout(()=>{
      if(wc.matchIndex >= wc.matches.length){
        if(wc.winners.length===1){ wc.champion = wc.winners[0]; renderWorldcupChampion(); return; }
        wc.items = wc.winners;
        wc.matches = buildMatches(wc.items);
        wc.matchIndex = 0;
        wc.winners = [];
      }
      renderWorldcupMatch();
    }, 180);
  }, 320);
}

/* ================= WHO'S GOT IT? (participant roulette) ================= */
let rouletteNames = [];
let rouletteSpinning = false;
function buildRouletteWheel(names){
  const n = names.length;
  const anglePer = 360/n;
  const colors = ['#FF6B9D','#FFC93C','#3DCFB6','#5DADE2','#B99AF5','#FF8566','#7B9FD4','#F7A6C4'];
  const gradient = names.map((_,i)=> `${colors[i%colors.length]} ${i*anglePer}deg ${(i+1)*anglePer}deg`).join(', ');
  const labels = names.map((name,i)=>{
    const midAngle = i*anglePer + anglePer/2 - 90;
    const rad = midAngle * Math.PI/180;
    const x = 50 + 33*Math.cos(rad);
    const y = 50 + 33*Math.sin(rad);
    return `<div class="roulette-label" style="left:${x}%; top:${y}%;">${name}</div>`;
  }).join('');
  return { gradient, labels };
}
function renderRoulette(){
  rouletteSpinning = false;
  const el = document.getElementById('roulette-content');
  el.innerHTML = `
    <div class="section-title">🔫 누가 쏠까?</div>
    <div class="menu-meta" style="margin-bottom:14px;">같이 먹는 사람들 이름을 넣고 룰렛을 돌려보세요</div>
    <div class="field">
      <label>이름 추가</label>
      <input type="text" id="roulette-name-input" placeholder="이름 입력 후 Enter">
    </div>
    <div class="chip-row" id="roulette-name-list">${rouletteNames.map((n,i)=>`<button type="button" class="chip selected" data-rm-name="${i}">${n} ✕</button>`).join('')}</div>
    <button class="btn" id="roulette-start" style="margin-top:16px;" ${rouletteNames.length<2?'disabled':''}>${rouletteNames.length<2 ? '2명 이상 입력해주세요' : '🔫 룰렛 시작'}</button>
  `;
  const input = document.getElementById('roulette-name-input');
  input.addEventListener('keydown', (e)=>{
    if(e.key==='Enter'){
      const v = input.value.trim();
      if(v && !rouletteNames.includes(v)) rouletteNames.push(v);
      input.value='';
      renderRoulette();
    }
  });
  el.querySelectorAll('[data-rm-name]').forEach(btn=>{
    btn.addEventListener('click', ()=>{ rouletteNames.splice(parseInt(btn.dataset.rmName),1); renderRoulette(); });
  });
  if(rouletteNames.length>=2){
    document.getElementById('roulette-start').addEventListener('click', renderRouletteWheelScreen);
  }
}
function renderRouletteWheelScreen(){
  const el = document.getElementById('roulette-content');
  const {gradient, labels} = buildRouletteWheel(rouletteNames);
  el.innerHTML = `
    <div class="section-title">🔫 누가 쏠까?</div>
    <div class="menu-meta">긴장하세요... 방아쇠를 당길 시간이에요</div>
    <div class="roulette-wrap">
      <div class="roulette-pointer">▼</div>
      <div class="roulette-wheel" id="roulette-wheel" style="background:conic-gradient(${gradient});">${labels}<div class="roulette-hub">🔫</div></div>
    </div>
    <button class="btn" id="roulette-spin">방아쇠 당기기</button>
    <button class="btn ghost" id="roulette-edit" style="margin-top:10px;">명단 다시 정하기</button>
    <div id="roulette-result"></div>
  `;
  document.getElementById('roulette-spin').addEventListener('click', spinRoulette);
  document.getElementById('roulette-edit').addEventListener('click', renderRoulette);
}
function spinRoulette(){
  if(rouletteSpinning) return;
  rouletteSpinning = true;
  const wheel = document.getElementById('roulette-wheel');
  const btn = document.getElementById('roulette-spin');
  btn.disabled = true;
  const n = rouletteNames.length;
  const anglePer = 360/n;
  const targetIdx = Math.floor(Math.random()*n);
  const segCenter = targetIdx*anglePer + anglePer/2;
  const finalRotation = 5*360 + (360 - segCenter);
  wheel.style.transform = `rotate(${finalRotation}deg)`;
  setTimeout(()=>{
    const picked = rouletteNames[targetIdx];
    const wrap = document.querySelector('.roulette-wrap');
    if(wrap) wrap.classList.add('roulette-shake');
    document.getElementById('roulette-result').innerHTML = `
      <div class="roulette-bang reveal">
        <div style="font-size:52px;">💥</div>
        <div class="menu-name" style="font-size:24px; margin:8px 0;">${picked}</div>
        <div class="menu-meta">오늘의 주인공으로 선택됐어요!</div>

    `;

}

function buildMissionsList(catSeed){
  return [
    { id:'try_category', icon:'🎲', text:`${catSeed} 메뉴에 도전해보세요`, check:h=>h.m&&h.m.category===catSeed },
    { id:'spicy', icon:'🌶️', text:'매운맛 메뉴 어때요?', check:h=>h.m&&h.m.spicy>=3 },
    { id:'healthy', icon:'🥗', text:'건강식으로 가볍게 챙겨보세요', check:h=>h.m&&h.m.category==='건강식' },
    { id:'light', icon:'🍃', text:'가벼운 한끼 어때요?', check:h=>h.m&&h.m.hunger===1 },
    { id:'budget', icon:'🪙', text:'저예산으로 알뜰하게', check:h=>h.m&&h.m.budget===1 },
    { id:'protein', icon:'🍗', text:'단백질 든든하게 챙겨보세요', check:h=>h.m&&(h.m.diet.pork||h.m.diet.beef||h.m.diet.seafood||h.m.diet.egg) },
  ];
}
function missionSeedForDate(y,mo,da){ return y*372+mo*31+da; }
function getTodayMission(){
  const d = new Date();
  const seed = missionSeedForDate(d.getFullYear(), d.getMonth()+1, d.getDate());
  const catSeed = CATEGORIES[seed % CATEGORIES.length];
  const missions = buildMissionsList(catSeed);
  const mission = missions[seed % missions.length];
  const todayStart = new Date(); todayStart.setHours(0,0,0,0);
  const todaysHistory = history.filter(h=>h.ts>=todayStart.getTime()).map(h=>({...h, m:MENU_DATABASE.find(x=>x.name===h.menu)}));
  const completed = todaysHistory.some(mission.check);
  return { ...mission, completed };
}
function computeMissionStreak(){
  const byDate = {};
  history.forEach(h=>{
    const d = new Date(h.ts);
    const key = `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
    (byDate[key]=byDate[key]||[]).push({...h, m:MENU_DATABASE.find(x=>x.name===h.menu)});
  });
  let count=0;
  Object.keys(byDate).forEach(key=>{
    const [y,mo,da] = key.split('-').map(Number);
    const seed = missionSeedForDate(y,mo,da);
    const catSeed = CATEGORIES[seed % CATEGORIES.length];
    const missions = buildMissionsList(catSeed);
    const mission = missions[seed % missions.length];
    if(byDate[key].some(mission.check)) count++;
  });
  return count;
}

/* ---------- scoring shared ---------- */
function hcMainTypeMatches(menuType, selected){
  if(!selected) return true;
  if(menuType===selected) return true;
  if(selected==='파스타' && menuType.startsWith('파스타')) return true;
  if(selected==='단백질 위주' && menuType.includes('단백질')) return true;
  return false;
}
function hcBaseScore(menu){
  let score = 0;
  if(hc.difficulty){
    const wantTier = HC_DIFF_TIER[HC_DIFF_MAP[hc.difficulty]];
    const gotTier = HC_DIFF_TIER[menu.difficulty] || 1;
    const d = Math.abs(wantTier-gotTier);
    score += d===0?20:(d===1?8:-15);
  }
  if(hc.sub.spice) score += (menu.spice===hc.sub.spice) ? 15 : 0;
  if(hc.sub.mainType) score += hcMainTypeMatches(menu.mainType, hc.sub.mainType) ? 15 : 0;
  if(hc.sub.fullness) score += (menu.fullness===hc.sub.fullness) ? 15 : 0;
  return score;
}
function hcCategoryPool(){ return hc.category ? HOMECOOK_MENU.filter(m=>m.category===hc.category) : HOMECOOK_MENU; }
function hcMatchRate(menu){
  if(!menu.mainIngredients.length) return { pct:100, missing:[] };
  const have = menu.mainIngredients.filter(ing => hc.fridgeItems.some(f=> ing.includes(f) || f.includes(ing)));
  return { pct: Math.round(have.length/menu.mainIngredients.length*100), missing: menu.mainIngredients.filter(i=>!have.includes(i)) };
}
function hcComputeFridgeCandidates(){
  const limit = hc.category ? 3 : 5;
  hc.candidates = hcCategoryPool().map(m=>{
    const match = hcMatchRate(m);
    return { menu:m, score: hcBaseScore(m) + match.pct*0.6, match };
  }).sort((a,b)=>b.score-a.score).slice(0,limit);
}
function hcComputeShoppingCandidates(){
  hc.candidates = hcCategoryPool().map(m=>({ menu:m, score: hcBaseScore(m) + Math.random()*5 }))
    .sort((a,b)=>b.score-a.score).slice(0,3);
}

  const el = document.getElementById('homecook-content');
  el.innerHTML = `
    <div class="hc-big-title">냉장고에 뭐 있어요?</div>
    <div class="menu-meta" style="margin-bottom:10px;">있는 재료를 탭해서 선택해주세요</div>
    ${Object.keys(INGREDIENT_CATEGORIES).map(cat=>`
      <div class="ing-group-title">${cat}</div>
      <div class="chip-row">${INGREDIENT_CATEGORIES[cat].map(ing=>`<button type="button" class="chip ${hc.fridgeItems.includes(ing)?'selected':''}" data-ing="${ing}">${ing}</button>`).join('')}</div>
    `).join('')}
    <div class="field" style="margin-top:16px;"><label>목록에 없다면 직접 입력</label><input type="text" id="hc-ing-add" placeholder="재료명 입력 후 Enter"></div>
    <div class="menu-meta" id="hc-fridge-count" style="margin:10px 0;">${hc.fridgeItems.length}개 선택됨</div>
    <button class="btn" id="hc-fridge-next">매칭 메뉴 찾기</button>
  `;
  el.querySelectorAll('[data-ing]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const ing = btn.dataset.ing;
      const idx = hc.fridgeItems.indexOf(ing);
      if(idx>=0) hc.fridgeItems.splice(idx,1); else hc.fridgeItems.push(ing);
      btn.classList.toggle('selected');
      document.getElementById('hc-fridge-count').textContent = hc.fridgeItems.length+'개 선택됨';
    });
  });
  el.querySelector('#hc-ing-add').addEventListener('keydown', (e)=>{
    if(e.key==='Enter'){
      const v = e.target.value.trim();
      if(v && !hc.fridgeItems.includes(v)) hc.fridgeItems.push(v);
      e.target.value='';
      renderHcFridgeInput();
    }
  });
  el.querySelector('#hc-fridge-next').addEventListener('click', ()=>{
    hcComputeFridgeCandidates();
    hcNav(renderHcCandidates, renderHcFridgeInput);
  });
}

/* ---------- 공통: 후보 카드 ---------- */
function renderHcCandidates(){
  const el = document.getElementById('homecook-content');
  if(!hc.candidates.length){
    el.innerHTML = `<div class="hc-big-title">앗, 조건에 맞는 메뉴가 없어요</div><div class="empty-note">난이도나 취향 조건을 좀 넓혀보시겠어요?</div>`;
    return;
  }
  el.innerHTML = `
    <div class="hc-big-title">${hc.mode==='fridge' ? '이런 메뉴 어때요?' : '메뉴를 골라주세요'}</div>
    <div class="stagger">${hc.candidates.map((c,i)=>`
      <div class="hc-menu-card" data-idx="${i}">
        <div class="menu-name">${c.menu.name}</div>
        <div class="menu-meta">${c.menu.category} · 난이도 ${c.menu.difficulty} · ${c.menu.cookTime}분 · 맵기 ${c.menu.spice}</div>
        ${hc.mode==='fridge' ? `
          <div style="margin-top:8px;"><span class="match-badge ${c.match.pct>=80?'high':c.match.pct>=50?'mid':'low'}">매칭 ${c.match.pct}%</span></div>
          ${c.match.missing.length ? `<div class="missing-note">${c.match.missing.join(', ')} ${c.match.missing.length}개만 더 있으면 만들 수 있어요</div>` : `<div class="missing-note" style="color:var(--success);">지금 있는 재료로 바로 만들 수 있어요!</div>`}
        ` : ''}
      </div>
    `).join('')}</div>
  `;
  el.querySelectorAll('.hc-menu-card').forEach(card=>{
    card.addEventListener('click', ()=>{
      hc.chosenMenu = hc.candidates[parseInt(card.dataset.idx)].menu;
      hc.servings = 1;
      if(hc.mode==='fridge') hcNav(renderHcFridgeFinal, renderHcCandidates);
      else hcNav(renderHcServings, renderHcCandidates);
    });
  });
}

/* ---------- 냉장고모드: 최종 레시피 ---------- */
function renderHcFridgeFinal(){
  const el = document.getElementById('homecook-content');
  const m = hc.chosenMenu;
  el.innerHTML = `
    <div class="hc-big-title">${m.name}</div>
    <div class="servings-row">${[1,2,3].map(n=>`<button class="servings-btn ${hc.servings===n?'selected':''}" data-serv="${n}">${n}인분</button>`).join('')}</div>
    <div id="hc-final-body"></div>
    <button class="btn ghost" id="hc-final-home" style="margin-top:14px;">🏠 홈으로</button>
  `;
  el.querySelectorAll('[data-serv]').forEach(btn=>{
    btn.addEventListener('click', ()=>{ hc.servings=parseInt(btn.dataset.serv); renderHcFridgeFinal(); });
  });
  el.querySelector('#hc-final-home').addEventListener('click', hcGoHome);
  renderHcFinalBody(m);
}
function renderHcFinalBody(m){
  const body = document.getElementById('hc-final-body');
  const items = m.ing[String(hc.servings)];
  const main = items.filter(i=>!i.isSeasoning);
  const season = items.filter(i=>i.isSeasoning);
  body.innerHTML = `
    <div class="card reveal">
      <div class="ing-group-title" style="margin-top:0;">재료</div>
      ${main.map(i=>`<div class="ing-check-row"><span class="ing-name">${i.name}</span><span class="ing-amount">${i.amount}</span></div>`).join('')}
      <div class="ing-group-title">기본 양념 (집에 있는 걸로)</div>
      ${season.map(i=>`<div class="ing-check-row"><span class="ing-name" style="opacity:.6;">${i.name}</span><span class="ing-amount">${i.amount}</span></div>`).join('')}
    </div>
    <div class="card reveal">
      <div class="ing-group-title" style="margin-top:0;">레시피</div>
      <div class="recipe-steps">${m.recipe}</div>
    </div>
  `;
  addHistory({menu:m.name});
}

/* ---------- 장보기모드: 인분수 + 리스트 ---------- */
function renderHcServings(){
  const el = document.getElementById('homecook-content');
  const m = hc.chosenMenu;
  el.innerHTML = `
    <div class="hc-big-title">${m.name}</div>
    <div class="menu-meta" style="margin-bottom:16px;">몇 인분 만드실 건가요?</div>
    <div class="servings-row">${[1,2,3].map(n=>`<button class="servings-btn" data-serv="${n}">${n}인분</button>`).join('')}</div>
  `;
  el.querySelectorAll('[data-serv]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      hc.servings = parseInt(btn.dataset.serv);
      hcNav(renderHcShoppingList, renderHcServings);
    });
  });
}
function renderHcShoppingList(){
  hcChecked = new Set();
  const el = document.getElementById('homecook-content');
  const m = hc.chosenMenu;
  const items = m.ing[String(hc.servings)];
  const main = items.filter(i=>!i.isSeasoning);
  const season = items.filter(i=>i.isSeasoning);
  const grouped = {};
  HC_GROUP_ORDER.forEach(g=>grouped[g]=[]);
  main.forEach(i=>{ (grouped[i.cat] = grouped[i.cat]||[]).push(i); });

  el.innerHTML = `
    <div class="hc-big-title">${m.name} 장보기 리스트</div>
    <div class="hc-progress-label" id="hc-progress-label">0 / ${main.length} 담음</div>
    <div class="progress-track" style="margin-bottom:18px;"><div class="progress-fill" id="hc-progress-fill" style="width:0%"></div></div>
    <div class="card reveal" id="hc-main-list">
      ${HC_GROUP_ORDER.filter(g=>grouped[g] && grouped[g].length).map(g=>`
        <div class="ing-group-title" style="margin-top:14px;">${g}</div>
        ${grouped[g].map(i=>`<div class="ing-check-row" data-key="${i.name}"><div class="ing-checkbox"></div><span class="ing-name">${i.name}</span><span class="ing-amount">${i.amount}</span></div>`).join('')}
      `).join('')}
    </div>
    <div class="ing-group-title">기본 양념 (집에 있으면 패스)</div>
    <div class="card reveal">
      ${season.map(i=>`<div class="ing-check-row" data-key="${i.name}"><div class="ing-checkbox"></div><span class="ing-name">${i.name}</span><span class="ing-amount">${i.amount}</span></div>`).join('')}
    </div>
    <button class="btn" id="hc-save-cart" style="margin-top:6px;">🛒 장바구니에 저장</button>
    <button class="btn ghost" id="hc-show-recipe" style="margin-top:10px;">레시피 보기</button>
    <div id="hc-recipe-box"></div>
    <button class="btn ghost" id="hc-list-home" style="margin-top:10px;">🏠 홈으로</button>
  `;
  el.querySelectorAll('.ing-check-row').forEach(row=>{
    row.addEventListener('click', ()=>{
      const key = row.dataset.key;
      const box = row.querySelector('.ing-checkbox');
      const nm = row.querySelector('.ing-name');
      if(hcChecked.has(key)){ hcChecked.delete(key); box.classList.remove('checked'); nm.classList.remove('done'); box.textContent=''; }
      else{ hcChecked.add(key); box.classList.add('checked'); nm.classList.add('done'); box.textContent='✓'; }
      const done = main.filter(i=>hcChecked.has(i.name)).length;
      document.getElementById('hc-progress-label').textContent = `${done} / ${main.length} 담음`;
      document.getElementById('hc-progress-fill').style.width = (main.length? done/main.length*100:0)+'%';
    });
  });
  el.querySelector('#hc-save-cart').addEventListener('click', async ()=>{
    try{
      const cart = { menu:m.name, servings:hc.servings, items: main.map(i=>i.name+' '+i.amount), ts: Date.now() };
      await window.storage.set('menumate:cart:'+Date.now(), JSON.stringify(cart));
      alert('장바구니에 저장했어요!');
    }catch(e){ alert('저장에 실패했어요.'); }
  });
  el.querySelector('#hc-show-recipe').addEventListener('click', ()=>{
    document.getElementById('hc-recipe-box').innerHTML = `<div class="card reveal"><div class="recipe-steps">${m.recipe}</div></div>`;
  });
  el.querySelector('#hc-list-home').addEventListener('click', hcGoHome);
  addHistory({menu:m.name});
}

/* ================= wire up nav ================= */
document.querySelectorAll('.tabbtn').forEach(b=> b.addEventListener('click', ()=>switchTab(b.dataset.tab)));
document.querySelectorAll('[data-close]').forEach(b=> b.addEventListener('click', closeOverlay));
document.getElementById('hc-back').addEventListener('click', ()=>{
  if(hcStack.length){ transitionHc(hcStack.pop()); }
  else{ closeOverlay(); switchTab('home'); }
});

(async function init(){
  await loadState();
  renderHome();
})();
</script>
</body>
</html>
