<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오메추</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css">
<style>
  :root{
    --primary:#FF5C8A;
    --primary-2:#FF9166;
    --secondary:#6C5CE7;
    --accent:#FFD166;
    --background:#FFF9F6;
    --surface:#FFFFFF;
    --foreground:#16121F;
    --muted:#847D95;
    --border:rgba(22,18,31,0.08);
    --success:#00C2A8;
    --warning:#FF9F1C;
    --error:#FF4D6D;
    --grad: linear-gradient(135deg, var(--primary), var(--primary-2));
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 8% 4%, rgba(255,92,138,0.20), transparent 40%),
      radial-gradient(circle at 95% 12%, rgba(108,92,231,0.18), transparent 38%),
      radial-gradient(circle at 20% 96%, rgba(255,209,102,0.20), transparent 42%),
      radial-gradient(circle at 90% 90%, rgba(0,194,168,0.14), transparent 40%),
      #FDF7F2;
    min-height:100vh;
    font-family:'Pretendard Variable','Pretendard',-apple-system,'Malgun Gothic',sans-serif;
    color:var(--foreground);
    display:flex; justify-content:center; align-items:flex-start;
    padding:28px 12px;
  }
  button{font-family:inherit;}

  /* ---------- app shell ---------- */
  #phone{
    width:100%; max-width:420px;
    height:860px; max-height:92vh;
    background:var(--background);
    border-radius:36px;
    overflow:hidden;
    position:relative;
    box-shadow: 0 40px 70px -30px rgba(255,92,138,0.35), 0 10px 30px -12px rgba(22,18,31,0.15);
    display:flex; flex-direction:column;
  }
  #screen-stack{ position:relative; flex:1; min-height:0; }
  .tabview, .overlay{
    position:absolute; inset:0;
    overflow-y:auto; -webkit-overflow-scrolling:touch;
    background:var(--background);
  }
  .tabview{display:none;}
  .tabview.active{display:block;}
  .overlay{
    display:none;
    background:var(--background);
    animation: slideIn .28s ease;
  }
  .overlay.active{display:block;}
  @keyframes slideIn{ from{transform:translateX(24px); opacity:0;} to{transform:translateX(0); opacity:1;} }

  .content{ padding:18px 16px 100px; }

  /* ---------- overlay header ---------- */
  .ov-header{
    position:sticky; top:0; z-index:5;
    display:flex; align-items:center; gap:10px;
    padding:16px; background:rgba(255,249,246,0.85); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
    border-bottom:1px solid var(--border);
  }
  .back-btn{
    width:36px;height:36px;border-radius:14px;border:none;
    background:var(--surface); color:var(--foreground);
    font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 10px -4px rgba(22,18,31,0.18);
  }
  .ov-title{font-size:17px; font-weight:900; letter-spacing:-0.2px;}

  /* ---------- home ---------- */
  .header-card{
    background:var(--grad); border-radius:28px; padding:26px; margin-bottom:18px;
    box-shadow:0 16px 30px -14px rgba(255,92,138,0.55);
    position:relative; overflow:hidden;
    display:flex; align-items:center; justify-content:space-between; gap:12px;
  }
  .header-card::after{
    content:""; position:absolute; top:-40%; right:-20%; width:180px; height:180px; border-radius:50%;
    background:rgba(255,255,255,0.18); pointer-events:none;
  }
  .header-copy{position:relative; z-index:1; min-width:0;}
  .header-card h1{margin:0; font-size:30px; font-weight:900; color:#fff; letter-spacing:-0.8px; position:relative;}
  .header-card p{margin:5px 0 0; font-size:13.5px; color:rgba(255,255,255,0.92); font-weight:600; position:relative;}
  .feedback-btn{
    position:relative; z-index:1; flex:0 0 auto;
    min-height:38px; padding:0 13px; border:1px solid rgba(255,255,255,0.45); border-radius:14px;
    background:rgba(255,255,255,0.92); color:var(--primary); text-decoration:none;
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    font-size:12.5px; font-weight:900; white-space:nowrap;
    box-shadow:0 8px 18px -10px rgba(22,18,31,0.35);
  }
  .feedback-btn:active{transform:scale(0.97);}
  @media (max-width:360px){
    .header-card{padding:22px 18px;}
    .header-card h1{font-size:26px;}
    .feedback-btn{padding:0 10px; font-size:12px;}
  }

  .banner{
    background:rgba(255,92,138,0.08); border:1.5px solid rgba(255,92,138,0.18);
    padding:13px 15px; border-radius:16px; margin-bottom:18px;
  }
  .banner .t1{font-size:13.5px; font-weight:800; color:var(--foreground); line-height:1.4;}
  .banner .t2{font-size:12px; font-weight:500; color:var(--muted); margin-top:5px; line-height:1.4;}

  .quote-card{
    background:var(--surface); border:1.5px solid var(--border); border-radius:28px;
    padding:28px; margin-bottom:26px; text-align:center;
    min-height:150px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px;
    box-shadow:0 20px 40px -24px rgba(22,18,31,0.18);
  }
  .quote-card .em{font-size:52px;}
  .quote-card .qt{font-size:17px; font-weight:800; line-height:1.5; letter-spacing:.2px;}

  .section-title{font-size:17px; font-weight:900; margin:6px 0 12px; letter-spacing:-0.3px;}

  .mode-grid, .feat-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:24px;}
  .mode-card, .feat-card{
    border:1.5px solid var(--border); background:var(--surface); border-radius:20px; padding:18px 16px; cursor:pointer;
    display:flex; flex-direction:column; align-items:flex-start; justify-content:flex-start; gap:10px;
    text-align:left; min-height:128px; position:relative;
    box-shadow:0 6px 18px -12px rgba(22,18,31,0.12);
    transition:transform .15s cubic-bezier(.2,.8,.3,1), box-shadow .15s ease, border-color .15s ease;
  }
  .mode-card:active, .feat-card:active{transform:scale(0.96); border-color:var(--primary); box-shadow:0 4px 10px -8px rgba(255,92,138,0.2);}
  .mode-icon-chip{
    width:40px; height:40px; border-radius:13px;
    display:flex; align-items:center; justify-content:center; font-size:19px;
    box-shadow:0 4px 10px rgba(22,18,31,0.1);
  }
  .mode-card .lb, .feat-card .lb{font-size:13.5px; font-weight:900; color:var(--foreground);}
  .mode-card .de, .feat-card .de{font-size:10.5px; font-weight:600; color:var(--muted); margin-top:-4px;}
  .mode-card-arrow{position:absolute; top:16px; right:16px; font-size:13px; color:var(--border); font-weight:800;}

  /* ---------- generic ---------- */
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:12.5px; font-weight:800; color:var(--muted); margin-bottom:7px;}
  .chip-row{display:flex; flex-wrap:wrap; gap:7px;}
  .chip-row.scroll{flex-wrap:nowrap; overflow-x:auto; -webkit-overflow-scrolling:touch; padding-bottom:2px; scrollbar-width:none;}
  .chip-row.scroll::-webkit-scrollbar{display:none;}
  .chip-row.scroll .chip{flex:none;}
  .chip{padding:13px 20px; border-radius:999px; border:1.5px solid var(--border); background:var(--surface); font-size:15px; font-weight:700; color:var(--foreground); cursor:pointer; transition:transform .1s ease;}
  .chip:active{transform:scale(0.95);}
  .chip.selected{background:var(--grad); border-color:transparent; color:#fff; font-weight:800; box-shadow:0 8px 16px -8px rgba(255,92,138,0.6);}
  textarea, input[type=text]{
    width:100%; border:1.5px solid var(--border); background:var(--surface); border-radius:16px;
    padding:13px 14px; font-size:14px; font-family:inherit; color:var(--foreground); resize:vertical;
  }
  textarea:focus, input:focus{outline:2px solid var(--primary); outline-offset:1px;}
  .btn{
    width:100%; padding:19px; border-radius:20px; border:none; background:var(--grad); color:#fff;
    font-size:16.5px; font-weight:800; cursor:pointer; box-shadow:0 14px 24px -10px rgba(255,92,138,0.55);
    transition:transform .12s cubic-bezier(.2,.8,.3,1);
  }
  .btn:active{transform:scale(0.97);}
  .btn.ghost{background:var(--surface); color:var(--muted); box-shadow:none; border:1.5px solid var(--border);}
  .btn.secondary{background:linear-gradient(135deg, var(--secondary), #9B8CFF); box-shadow:0 14px 24px -10px rgba(108,92,231,0.5);}

  .card{background:var(--surface); border:1.5px solid var(--border); border-radius:22px; padding:18px; margin-bottom:12px; box-shadow:0 16px 30px -22px rgba(22,18,31,0.25);}
  .menu-name{font-size:17px; font-weight:800;}
  .menu-meta{font-size:11.5px; color:var(--muted); margin-top:3px; font-weight:700;}
  .menu-reason{font-size:13px; color:#5b5468; margin-top:7px; line-height:1.55;}
  .tag{display:inline-block; padding:4px 10px; border-radius:999px; background:rgba(255,92,138,0.12); color:var(--primary); font-size:10.5px; font-weight:800; margin:2px 4px 0 0;}

  .empty-note{text-align:center; color:var(--muted); font-size:13px; padding:40px 20px;}

  /* ---------- floating glass tab bar ---------- */
  #tabbar{
    flex:none; display:flex; gap:2px;
    background:rgba(255,255,255,0.75); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.6);
    border-radius:999px;
    margin:0 14px calc(env(safe-area-inset-bottom,0px) + 14px);
    padding:7px;
    box-shadow:0 20px 40px -18px rgba(22,18,31,0.35);
    position:relative; z-index:8;
  }
  .tabbtn{
    flex:1; background:none; border:none; border-radius:999px; display:flex; flex-direction:column; align-items:center; gap:1px;
    padding:8px 2px; cursor:pointer; color:var(--muted); transition:background .15s ease, color .15s ease;
  }
  .tabbtn .ic{font-size:19px;}
  .tabbtn .lb{font-size:9.5px; font-weight:800;}
  .tabbtn.active{color:#fff; background:var(--grad); box-shadow:0 8px 16px -8px rgba(255,92,138,0.55);}

  /* ---------- worldcup ---------- */
  .wc-vs{display:flex; align-items:center; justify-content:center; gap:10px; margin:8px 0 18px; color:var(--muted); font-weight:900; font-size:12px;}
  .wc-pair{display:flex; flex-direction:column; gap:14px;}
  .wc-card{
    border:none; border-radius:26px; background:var(--surface); border:2px solid var(--border);
    padding:24px 16px; text-align:center; cursor:pointer;
    box-shadow:0 16px 30px -20px rgba(22,18,31,0.25);
    transition:transform .12s ease, border-color .12s ease;
  }
  .wc-card:active{transform:scale(0.96); border-color:var(--primary);}
  .wc-card.picked{border-color:var(--primary); background:rgba(255,92,138,0.08); box-shadow:0 0 0 3px rgba(255,92,138,0.15);}
  .wc-card .nm{font-size:19px; font-weight:900;}
  .wc-card .ct{font-size:12px; color:var(--muted); margin-top:4px; font-weight:600;}
  .wc-desc{font-size:11.5px; color:#5b5468; margin-top:8px; line-height:1.5; font-weight:500;}
  .tip-card{position:relative;}
  .tip-like-btn{position:absolute; top:18px; right:18px; border:1.5px solid var(--border); background:var(--surface); border-radius:999px; padding:6px 12px; font-size:12px; font-weight:800; cursor:pointer; color:var(--foreground);}
  .tip-like-btn.liked{border-color:transparent; background:rgba(255,92,138,0.1); color:var(--primary); cursor:default;}
  .tip-like-btn:not(.liked):active{transform:scale(0.92);}
  .progress-track{height:6px; border-radius:999px; background:var(--border); overflow:hidden; margin-bottom:6px;}
  .progress-fill{height:100%; background:var(--grad); transition:width .3s ease;}
  .round-badge{display:inline-block; padding:5px 13px; border-radius:999px; background:rgba(255,92,138,0.12); color:var(--primary); font-size:11.5px; font-weight:800; margin-bottom:10px;}

  /* ---------- consensus ---------- */
  .member-card{background:var(--surface); border:1.5px solid var(--border); border-radius:18px; padding:14px; margin-bottom:10px; position:relative; box-shadow:0 10px 20px -16px rgba(22,18,31,0.2);}
  .member-card .rm{position:absolute; top:10px; right:10px; background:none; border:none; color:var(--muted); font-size:16px; cursor:pointer;}
  .conflict-row{display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-bottom:1px dashed var(--border); font-size:13px;}
  .status-dot{width:8px;height:8px;border-radius:50%; display:inline-block; margin-right:6px;}

  .cal-day{display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid var(--border);}
  .cal-day:last-child{border-bottom:none;}
  .cal-dow{width:34px; text-align:center; font-weight:900; font-size:13px; color:var(--primary);}

  .hist-row{display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--border); align-items:baseline;}
  .hist-row:last-child{border-bottom:none;}
  .cal-grid-header{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;}
  .cal-nav-btn{width:32px; height:32px; border-radius:10px; border:1.5px solid var(--border); background:var(--surface); font-size:16px; font-weight:800; color:var(--foreground); cursor:pointer;}
  .cal-nav-btn:active{transform:scale(0.9);}
  .cal-grid-title{font-size:15.5px; font-weight:900;}
  .cal-grid-dow{display:grid; grid-template-columns:repeat(7,1fr); text-align:center; font-size:11px; font-weight:800; color:var(--muted); margin-bottom:6px;}
  .cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:4px;}
  .cal-grid-day{aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center; border-radius:12px; cursor:pointer; position:relative; transition:transform .1s ease, background .12s ease;}
  .cal-grid-day.empty{cursor:default;}
  .cal-grid-day:not(.empty):active{transform:scale(0.9);}
  .cal-day-num{font-size:12.5px; font-weight:700;}
  .cal-grid-day.today{background:var(--grad); box-shadow:0 8px 16px -8px rgba(255,92,138,0.5);}
  .cal-grid-day.today .cal-day-num{color:#fff;}
  .cal-grid-day.has-entry:not(.today){background:rgba(255,92,138,0.08);}
  .cal-grid-day.selected:not(.today){border:2px solid var(--primary);}
  .cal-day-dot{width:5px; height:5px; border-radius:50%; background:var(--primary); margin-top:2px;}
  .cal-grid-day.today .cal-day-dot{background:#fff;}
  .health-stat-card{text-align:center; padding:20px;}
  .health-stat-label{font-size:12px; font-weight:800; color:var(--muted); margin-bottom:4px;}
  .health-stat-value{font-size:30px; font-weight:900; color:var(--primary); line-height:1.2;}
  .health-stat-unit{font-size:15px; font-weight:800; margin-left:3px;}
  .health-pattern-row{display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px dashed var(--border);}
  .health-pattern-row:last-child{border-bottom:none;}
  .health-pattern-icon{width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; flex:none;}
  .health-pattern-icon.good{background:rgba(0,194,168,0.12);}
  .health-pattern-icon.watch{background:rgba(255,159,28,0.12);}
  .health-pattern-text{font-size:13px; font-weight:600; line-height:1.4;}
  .hist-del-btn{width:22px; height:22px; border-radius:8px; border:none; background:rgba(255,77,109,0.1); color:var(--error); font-size:12px; font-weight:800; cursor:pointer; flex:none;}
  .hist-del-btn:active{transform:scale(0.9);}
  .source-balance-row{display:flex; justify-content:space-around; text-align:center;}
  .source-balance-icon{font-size:24px; margin-bottom:4px;}
  .source-balance-pct{font-size:18px; font-weight:900; color:var(--primary);}
  .source-balance-label{font-size:11px; font-weight:700; color:var(--muted); margin-top:2px;}
  .activity-tip-card{background:rgba(0,194,168,0.06); border-color:rgba(0,194,168,0.2);}
  .activity-tip-label{font-size:12px; font-weight:800; color:var(--success); margin-bottom:6px;}
  .activity-tip-text{font-size:13px; font-weight:600; line-height:1.5;}
  .taste-char-card{text-align:center; padding:26px 18px;}
  .taste-char-avatar{font-size:56px; line-height:1;}
  .taste-char-lv{font-size:13px; font-weight:900; color:var(--primary); margin-top:8px;}
  .taste-char-title{font-size:19px; font-weight:900; margin-top:2px;}
  .taste-stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px;}
  .taste-stat-item{background:var(--surface); border:1.5px solid var(--border); border-radius:16px; padding:14px; box-shadow:0 10px 20px -18px rgba(22,18,31,0.25); opacity:.5;}
  .taste-stat-item.active{opacity:1;}
  .taste-stat-icon{font-size:20px;}
  .taste-stat-name{font-size:11.5px; font-weight:800; margin-top:4px;}
  .taste-stat-lv{font-size:10.5px; font-weight:700; color:var(--muted); margin-top:1px;}
  /* ---------- custom recommendation quiz (capsule) ---------- */
  .qz-dots{display:flex; gap:6px; justify-content:center; margin-bottom:20px;}
  .qz-dot{width:7px; height:7px; border-radius:50%; background:var(--border); transition:all .3s ease;}
  .qz-dot.filled{width:18px; border-radius:4px; background:var(--accent, var(--primary));}
  .qz-title{font-size:20px; font-weight:900; text-align:center; margin-bottom:22px; letter-spacing:-0.3px;}
  .qz-opt{display:flex; align-items:center; gap:12px; border:2px solid var(--border); background:var(--surface); border-radius:20px; padding:18px 20px; margin-bottom:11px; cursor:pointer; font-size:16px; font-weight:700; color:var(--foreground); width:100%; text-align:left; transition:transform .12s ease, border-color .12s ease, background .12s ease; box-shadow:0 10px 20px -18px rgba(22,18,31,0.3);}
  .qz-opt:active{transform:scale(0.97);}
  .qz-opt.picked{color:#fff;}
  .qz-opt .em{font-size:23px;}
  .qz-stage{position:relative;}
  .qz-anim-out{animation: qzOutLeft .22s ease forwards;}
  .qz-anim-in{animation: qzInRight .28s ease;}
  @keyframes qzOutLeft{ to{ transform:translateX(-18px); opacity:0; } }
  @keyframes qzInRight{ from{ transform:translateX(18px); opacity:0; } to{ transform:translateX(0); opacity:1; } }
  .qz-capsule-wrap{display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px 0; position:relative;}
  .qz-capsule{position:relative; width:110px; height:110px;}
  .qz-cap-half{position:absolute; left:0; width:110px; height:55px; overflow:hidden;}
  .qz-cap-half.top{top:0; border-radius:55px 55px 0 0;}
  .qz-cap-half.bottom{bottom:0; border-radius:0 0 55px 55px;}
  .qz-cap-half .fill{position:absolute; width:110px; height:110px;}
  .qz-cap-half.top .fill{top:0; background:linear-gradient(160deg, #FF6B9D, #B99AF5);}
  .qz-cap-half.bottom .fill{bottom:0; background:var(--surface); border:2px solid var(--border); border-top:none;}
  .qz-cap-shine{position:absolute; top:10px; left:16px; width:20px; height:32px; border-radius:50%; background:rgba(255,255,255,0.55); transform:rotate(-18deg);}
  .qz-capsule.shaking{animation: qzShake .55s ease-in-out;}
  @keyframes qzShake{ 0%,100%{transform:translateX(0) rotate(0);} 15%{transform:translateX(-6px) rotate(-5deg);} 30%{transform:translateX(6px) rotate(5deg);} 45%{transform:translateX(-5px) rotate(-4deg);} 60%{transform:translateX(5px) rotate(4deg);} 75%{transform:translateX(-3px) rotate(-2deg);} 90%{transform:translateX(2px) rotate(1deg);} }
  .qz-capsule.cracking .qz-cap-half.top{animation: qzCrackUp .5s ease forwards;}
  .qz-capsule.cracking .qz-cap-half.bottom{animation: qzCrackDown .5s ease forwards;}
  @keyframes qzCrackUp{ to{ transform:translateY(-55px) rotate(-20deg); opacity:0; } }
  @keyframes qzCrackDown{ to{ transform:translateY(55px) rotate(20deg); opacity:0; } }
  .qz-confetti-layer{position:absolute; inset:0; pointer-events:none; overflow:visible;}
  .qz-confetti{position:absolute; top:50%; left:50%; width:8px; height:8px; border-radius:2px; opacity:0;}
  .qz-confetti.pop{animation: qzConfettiPop .9s cubic-bezier(.2,.7,.3,1) forwards;}
  @keyframes qzConfettiPop{
    0%{ opacity:1; transform:translate(-50%,-50%) scale(0.6); }
    100%{ opacity:0; transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) rotate(var(--rot)) scale(1); }
  }
  .qz-drawing-label{margin-top:16px; font-size:13px; font-weight:700; color:var(--muted);}
  .qz-result{animation: qzResultPop .4s cubic-bezier(.2,.8,.25,1);}
  @keyframes qzResultPop{ from{ transform:scale(0.88); opacity:0; } to{ transform:scale(1); opacity:1; } }
  /* ---------- nearby restaurant search (Kakao Local API via backend) ---------- */
  .map-link-btn{width:100%; margin-top:14px; padding:13px; border-radius:14px; border:none; background:linear-gradient(135deg, #03C75A, #02B350); color:#fff; font-weight:800; font-size:13.5px; cursor:pointer; box-shadow:0 10px 20px -10px rgba(3,199,90,0.5); transition:transform .12s cubic-bezier(.2,.8,.3,1);}
  .map-link-btn:active{transform:scale(0.97);}
  .rest-card{padding:18px;}

  /* ---------- micro-interactions: reveal, stagger, tab fade, spinner ---------- */
  .reveal{animation: revealUp .45s cubic-bezier(.2,.8,.25,1) both;}
  @keyframes revealUp{ from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);} }
  .stagger > *{animation: revealUp .45s cubic-bezier(.2,.8,.25,1) both;}
  .stagger > *:nth-child(1){animation-delay:.03s;}
  .stagger > *:nth-child(2){animation-delay:.09s;}
  .stagger > *:nth-child(3){animation-delay:.15s;}
  .stagger > *:nth-child(4){animation-delay:.21s;}
  .stagger > *:nth-child(5){animation-delay:.27s;}
  .stagger > *:nth-child(n+6){animation-delay:.3s;}
  .tabview.active{animation: tabFade .32s cubic-bezier(.2,.8,.25,1);}
  @keyframes tabFade{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }
  .spin-dot{display:inline-flex; gap:4px; vertical-align:middle;}
  .spin-dot span{width:5px; height:5px; border-radius:50%; background:var(--primary); animation: spinDot 1s ease-in-out infinite;}
  .spin-dot span:nth-child(2){animation-delay:.15s;}
  .spin-dot span:nth-child(3){animation-delay:.3s;}
  @keyframes spinDot{ 0%,80%,100%{opacity:.25; transform:scale(0.7);} 40%{opacity:1; transform:scale(1);} }
  .wc-fade-out{animation: wcFadeOut .18s ease forwards;}
  .wc-fade-in{animation: revealUp .32s cubic-bezier(.2,.8,.25,1);}
  @keyframes wcFadeOut{ to{opacity:0; transform:scale(0.97);} }
  .confirm-pop{animation: confirmPop .5s cubic-bezier(.2,.8,.25,1) both;}
  @keyframes confirmPop{ 0%{opacity:0; transform:scale(0.9);} 60%{transform:scale(1.02);} 100%{opacity:1; transform:scale(1);} }

  /* ---------- home cooking mode ---------- */

  .hc-big-title{font-size:20px; font-weight:900; margin-bottom:18px; letter-spacing:-0.3px;}
  .score-row{display:flex; align-items:center; gap:10px; margin-bottom:10px; cursor:pointer; padding:12px 14px; border-radius:16px; border:2px solid var(--border); background:var(--surface); transition:border-color .15s ease, transform .12s ease;}
  .score-row:active{transform:scale(0.98);}
  .score-row.top{border-color:var(--primary); background:rgba(255,92,138,0.06);}
  .score-row .sr-label{width:92px; font-weight:800; font-size:13.5px; flex:none;}
  .score-row .sr-track{flex:1; height:10px; border-radius:999px; background:var(--border); overflow:hidden;}
  .score-row .sr-fill{height:100%; background:var(--grad); border-radius:999px; transition:width .5s cubic-bezier(.2,.8,.25,1);}
  .score-row .sr-badge{font-size:10px; font-weight:900; color:var(--primary); flex:none; width:34px; text-align:right;}
  .hc-mode-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:6px;}
  .hc-mode-card{border:none; border-radius:26px; padding:26px 14px; cursor:pointer; text-align:center; box-shadow:0 18px 34px -18px rgba(22,18,31,0.4); transition:transform .15s cubic-bezier(.2,.8,.3,1), box-shadow .15s ease; position:relative; overflow:hidden;}

  .hc-mode-card[data-hcmode="fridge"]{background:linear-gradient(135deg, #5DDDC0, #34B4A8);}
  .hc-mode-card[data-hcmode="shopping"]{background:linear-gradient(135deg, #FFB84D, #FF8A5C);}
  .hc-mode-card .em{font-size:40px; display:block; margin-bottom:10px; position:relative; filter:drop-shadow(0 4px 8px rgba(0,0,0,0.15));}
  .hc-mode-card .lb{font-weight:900; font-size:15.5px; display:block; color:#fff; position:relative;}
  .hc-mode-card .de{font-size:11px; color:rgba(255,255,255,0.85); opacity:1; margin-top:5px; display:block; line-height:1.5; position:relative; font-weight:600;}
  .ing-group-title{font-size:12.5px; font-weight:800; color:var(--muted); margin:16px 0 8px;}
  .ing-group-title:first-child{margin-top:0;}

  .match-badge.mid{background:var(--warning);}
  .match-badge.low{background:var(--muted);}
  .missing-note{font-size:12px; color:var(--primary); font-weight:700; margin-top:6px;}
  .hc-menu-card{background:var(--surface); border:1.5px solid var(--border); border-radius:22px; padding:16px; margin-bottom:12px; cursor:pointer; box-shadow:0 14px 26px -20px rgba(22,18,31,0.3); transition:transform .12s cubic-bezier(.2,.8,.3,1), border-color .12s ease, box-shadow .12s ease;}
  .hc-menu-card:active{transform:scale(0.97); border-color:var(--primary); box-shadow:0 16px 30px -16px rgba(255,92,138,0.35);}
  .servings-row{display:flex; gap:8px; margin-bottom:18px;}
  .servings-btn{flex:1; padding:18px; border-radius:18px; border:2px solid var(--border); background:var(--surface); font-weight:800; font-size:15.5px; cursor:pointer; box-shadow:0 8px 16px -14px rgba(22,18,31,0.3); transition:transform .12s cubic-bezier(.2,.8,.3,1), box-shadow .12s ease;}
  .servings-btn:active{transform:scale(0.95);}
  .servings-btn.selected{border-color:transparent; background:var(--grad); color:#fff; box-shadow:0 12px 22px -10px rgba(255,92,138,0.55);}
  .ing-check-row{display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--border);}

  .ing-checkbox{width:22px; height:22px; border-radius:8px; border:2px solid var(--border); flex:none; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:13px; color:#fff; transition:background .12s ease, border-color .12s ease;}

  /* ---------- food roulette ---------- */
  .roulette-wrap{position:relative; width:250px; height:250px; margin:24px auto 20px;}
  .roulette-pointer{position:absolute; top:-16px; left:50%; transform:translateX(-50%); font-size:28px; z-index:5; filter:drop-shadow(0 3px 4px rgba(0,0,0,0.35));}
  .roulette-wheel{width:100%; height:100%; border-radius:50%; position:relative; transition: transform 3.6s cubic-bezier(.12,.72,.13,1); box-shadow: 0 16px 34px -12px rgba(22,18,31,0.45), 0 0 0 6px #fff, 0 0 0 9px var(--border);}
  .roulette-label{position:absolute; transform:translate(-50%,-50%); font-size:11px; font-weight:900; color:#fff; text-shadow:0 1px 3px rgba(0,0,0,0.5); width:64px; text-align:center; pointer-events:none; line-height:1.25;}
  .roulette-hub{position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:34px; height:34px; border-radius:50%; background:#fff; box-shadow:0 4px 10px rgba(0,0,0,0.25); display:flex; align-items:center; justify-content:center; font-size:15px; z-index:3;}
  .roulette-shake{animation: rouletteShake .5s ease;}
  @keyframes rouletteShake{
    0%,100%{transform:translate(0,0);}
    20%{transform:translate(-6px,3px);}
    40%{transform:translate(6px,-3px);}
    60%{transform:translate(-4px,2px);}
    80%{transform:translate(4px,-2px);}
  }
  .roulette-bang{text-align:center;}

  /* ---------- daily mission ---------- */
  .mission-badge-done{display:inline-block; margin-top:10px; padding:5px 14px; border-radius:999px; background:rgba(0,194,168,0.14); color:var(--success); font-weight:900; font-size:12.5px;}

  /* ---------- achievements: streak / badges / stamps ---------- */
  .streak-card{text-align:center; padding:22px 18px;}

  .badge-grid{display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:24px;}
  .badge-item{background:var(--surface); border:1.5px solid var(--border); border-radius:18px; padding:14px 8px; text-align:center; box-shadow:0 12px 22px -18px rgba(22,18,31,0.3); transition:transform .12s ease;}

</style>

async function loadState(){
  try{ const p = await window.storage.get(STORAGE_PROFILE_KEY); if(p && p.value) profile = {...profile, ...JSON.parse(p.value)}; }catch(e){}
  try{ const h = await window.storage.get(STORAGE_HISTORY_KEY); if(h && h.value) history = JSON.parse(h.value); }catch(e){}
}
async function saveProfile(){ try{ await window.storage.set(STORAGE_PROFILE_KEY, JSON.stringify(profile)); }catch(e){} }
async function addHistory(entry){
  history.unshift({...entry, ts: Date.now()});
  history = history.slice(0, 30);
  try{ await window.storage.set(STORAGE_HISTORY_KEY, JSON.stringify(history)); }catch(e){}
  bumpCommunityMenuCount(entry.menu);
}
async function clearHistory(){ history = []; try{ await window.storage.set(STORAGE_HISTORY_KEY, JSON.stringify(history)); }catch(e){} renderProfile(); renderCommunity(); }
async function deleteHistoryEntry(ts){
  history = history.filter(h=>h.ts!==ts);
  try{ await window.storage.set(STORAGE_HISTORY_KEY, JSON.stringify(history)); }catch(e){}
}

/* ---------- shared community data (visible to all users of this app) ---------- */
async function bumpCommunityMenuCount(menuName){
  let counts = {};
  try{
    const r = await window.storage.get('community:menucounts', true);
    if(r && r.value) counts = JSON.parse(r.value);
  }catch(e){ /* key doesn't exist yet, start fresh */ }
  counts[menuName] = (counts[menuName]||0)+1;
  try{ await window.storage.set('community:menucounts', JSON.stringify(counts), true); }catch(e){}
}
async function loadCommunityMenuCounts(){
  try{ const r = await window.storage.get('community:menucounts', true); return (r&&r.value)?JSON.parse(r.value):{}; }catch(e){ return {}; }
}
async function loadCommunityTips(){
  try{ const r = await window.storage.get('community:tips', true); return (r&&r.value)?JSON.parse(r.value):[]; }catch(e){ return []; }
}
async function addCommunityTip(menu, place, note){
  const tips = await loadCommunityTips();
  const id = Date.now()+'_'+Math.floor(Math.random()*100000);
  tips.unshift({id, menu, place, note, ts: Date.now(), likes: 0});
  const trimmed = tips.slice(0,50);
  try{ await window.storage.set('community:tips', JSON.stringify(trimmed), true); }catch(e){}
  return trimmed;
}
async function likeCommunityTip(tipId){
  const tips = await loadCommunityTips();
  const tip = tips.find(t=>(t.id||String(t.ts))===tipId);
  if(tip) tip.likes = (tip.likes||0)+1;
  try{ await window.storage.set('community:tips', JSON.stringify(tips), true); }catch(e){}
  return tips;
}

function getConfirmedMenuNames(){
  const days = profile.excludeConfirmedDays;
  if(!days) return new Set();
  if(days==='forever') return new Set(history.map(h=>h.menu));
  const cutoff = Date.now() - days*86400000;
  return new Set(history.filter(h=>h.ts>=cutoff).map(h=>h.menu));
}

  '볶음·구이류':{low:350,high:600}, '샐러드·간단요리':{low:200,high:400},
};
const CAL_BASE_CVS = {
  '한끼':{low:350,high:600}, '라면':{low:400,high:550}, '과자':{low:150,high:350},
  '아이스크림':{low:100,high:250}, '음료':{low:0,high:250}, '안주':{low:150,high:400},
};
function roundCal(n){ return Math.round(n/50)*50; }
function estimateCalories(item, dbType, servings){
  let base, hungerTier;
  if(dbType==='menu'){ base = CAL_BASE_MENU[item.category] || {low:350,high:600}; hungerTier = item.hunger; }
  else if(dbType==='homecook'){ base = CAL_BASE_HOMECOOK[item.category] || {low:350,high:600}; hungerTier = item.hunger; }
  else { base = CAL_BASE_CVS[item.category] || {low:200,high:400}; hungerTier = null; }
  let {low, high} = base;
  if(hungerTier===1){ low*=0.75; high*=0.75; }
  if(hungerTier===3){ low*=1.15; high*=1.15; }
  const mult = servings || 1;
  return { low: roundCal(low*mult), high: roundCal(high*mult) };
}
function calorieTagHTML(item, dbType, servings){
  const c = estimateCalories(item, dbType, servings);
  const label = servings && servings>1 ? `${servings}인분 기준` : '1인분';
  return `<span class="tag cal-tag">🔥 약 ${c.low}~${c.high}kcal (${label} 추정)</span>`;
}
function excludeConfirmedFrom(pool){
  const confirmed = getConfirmedMenuNames();
  if(!confirmed.size) return pool;
  const filtered = pool.filter(m=>!confirmed.has(m.name));
  return filtered.length ? filtered : pool;
}
function passesAvoidFilter(menu, avoidText, excludes){
  const hay = (menu.name+' '+menu.reason+' '+menu.pair);
  if(avoidText){
    const kws = avoidText.split(/[,\s]+/).map(s=>s.trim()).filter(Boolean);
    if(kws.some(k => hay.includes(k))) return false;
  }
  if(excludes && excludes.length){
    if(excludes.some(k => menu.diet && menu.diet[k])) return false;
  }
  return true;
}
function scoreForProfile(menu, profile){
  let score = Math.random()*6;
  score += (3 - Math.abs(menu.budget-BUDGET_TIER[profile.budget]))*10;
  score += (3 - Math.abs(menu.spicy-SPICE_TIER[profile.spice]))*8;
  if((profile.companion==='가족'||profile.companion==='회사동료') && menu.hunger===3) score+=8;
  if(profile.companion==='혼자' && menu.hunger!==3) score+=5;
  if(profile.companion==='연인' && menu.hunger!==1) score+=3;
  return score;
}
function pickTop(cands, n){ return cands.sort((a,b)=>b.score-a.score).slice(0,n); }
function weightedRandomPick(pool){ return pool[Math.floor(Math.random()*pool.length)]; }
function fmtDate(ts){ const d=new Date(ts); return (d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }

/* ================= consensus algorithm (rebuilt on the real MENU_DATABASE) ================= */
let consensusMembers = [];
let consensusFormExcludes = [];
let consensusFormWant = null;
let consensusFormBudget = '보통';
let consensusFormSpice = '보통';
const CONSENSUS_WANT_OPTS = ['위로','기분전환','스트레스해소','활력충전','편안함','특별함','도전','자기관리','축하'];
function calculateConsensus(members){
  if(!members.length) return { recommendations:[], conflictMap:[] };
  const minBudgetTier = Math.min(...members.map(m=>BUDGET_TIER[m.budget]));
  const minSpiceTier = Math.min(...members.map(m=>SPICE_TIER[m.spice]));
  const allExcludes = [...new Set(members.flatMap(m=>m.excludes))];

  const scored = [];
  let pool = excludeConfirmedFrom(MENU_DATABASE).filter(menu=>{
    if(allExcludes.some(k => menu.diet && menu.diet[k])) return false;
    if(menu.budget > minBudgetTier) return false;
    return true;
  });
  const withinSpice = pool.filter(menu => menu.spicy <= minSpiceTier);
  if(withinSpice.length) pool = withinSpice;
  else{
    const closeSpice = pool.filter(menu => menu.spicy <= minSpiceTier+1);
    if(closeSpice.length) pool = closeSpice;
  }

  for(const menu of pool){
    let score = 50;
    const reasons = [];

    if(menu.spicy <= minSpiceTier) reasons.push('다들 부담없이 먹을 수 있는 맵기예요');
    else reasons.push('맵기에 예민한 멤버에겐 조금 매울 수 있어요');

    let wantMatches = 0;
    members.forEach(m=>{ if(m.want && menu.mood && menu.mood.includes(m.want)) wantMatches++; });
    if(wantMatches>0){ score += wantMatches*26; reasons.push(`${wantMatches}명이 원했던 느낌과 잘 맞아요`); }

    if(menu.budget < minBudgetTier){ score += 10; reasons.push('예산에 여유가 있어요'); }
    else reasons.push('예산 안에 딱 맞아요');

    score += Math.random()*4;
    scored.push({ menu, score, reasons });
  }
  scored.sort((a,b)=>b.score-a.score);
  const recommendations = scored.slice(0,5);

  const conflictMap = recommendations.map(r=>{
    let okCount = 0;
    members.forEach(m=>{
      const excludeOk = !m.excludes.some(k=>r.menu.diet && r.menu.diet[k]);
      const budgetOk = r.menu.budget <= BUDGET_TIER[m.budget];
      if(excludeOk && budgetOk) okCount++;
    });
    const ratio = okCount/members.length;
    const status = ratio===1?'all_ok':(ratio>=0.7?'mostly_ok':'conflict');
    return { menuName:r.menu.name, status, okCount, total:members.length };
  });

  return { recommendations, conflictMap };
}

function renderCustomDots(){

function customScore(menu){
  let score = Math.random()*8;
  const HUNGER_TIER2 = {'가벼움':1,'보통':2,'든든함':3};
  score += (3 - Math.abs(menu.hunger - (HUNGER_TIER2[customAnswers.hunger]||2)))*8;
  score += (3 - Math.abs(menu.spicy - SPICE_TIER[customAnswers.spice]))*10;
  score += (3 - Math.abs(menu.budget - BUDGET_TIER[customAnswers.budget]))*10;
  if((customAnswers.companion==='가족'||customAnswers.companion==='회사동료') && menu.hunger===3) score+=8;
  if(customAnswers.companion==='혼자' && menu.hunger!==3) score+=5;
  const moodTags = MOOD_MAP[customAnswers.mood] || [];
  if(menu.mood && menu.mood.some(m=>moodTags.includes(m))) score += 36;
  return score;
}
function customDrawMenu(){
  let basePool = excludeConfirmedFrom(MENU_DATABASE.filter(m=>passesAvoidFilter(m, profile.avoid, profile.excludes)));
  if(customAnswers.spice){
    const wantTier = SPICE_TIER[customAnswers.spice];
    const exactPool = basePool.filter(m=>m.spicy===wantTier);
    if(exactPool.length) basePool = exactPool;
  }
  if(customAnswers.budget){
    const wantTier = BUDGET_TIER[customAnswers.budget];
    const exactPool = basePool.filter(m=>m.budget===wantTier);
    if(exactPool.length) basePool = exactPool;
  }
  if(customAnswers.novelty && customAnswers.novelty!=='either'){
    const wantPopular = customAnswers.novelty==='popular';
    const exactPool = basePool.filter(m=>m.popular===wantPopular);
    if(exactPool.length) basePool = exactPool;
  }
  const scored = basePool.map(m=>({menu:m, score:customScore(m)})).sort((a,b)=>b.score-a.score);
  const top = scored.slice(0,12).filter(t=>!customShownNames.has(t.menu.name));
  const pool = top.length ? top : (customShownNames.clear(), scored.slice(0,12));
  if(!pool.length) return null;
  const picked = pool[Math.floor(Math.random()*pool.length)];
  customShownNames.add(picked.menu.name);
  return picked.menu;
}

function qzBurstConfetti(){
  const layer = document.getElementById('qz-confetti-layer');
  if(!layer) return;
  const colors = QZ_ACCENTS.map(a=>QZ_ACCENT_HEX[a]);
  for(let i=0;i<26;i++){
    const p = document.createElement('div');
    p.className = 'qz-confetti';
    const angle = Math.random()*Math.PI*2;
    const dist = 70 + Math.random()*90;
    p.style.setProperty('--dx', Math.cos(angle)*dist+'px');
    p.style.setProperty('--dy', Math.sin(angle)*dist - 30+'px');
    p.style.setProperty('--rot', (Math.random()*360)+'deg');
    p.style.background = colors[i%colors.length];
    p.style.borderRadius = Math.random()>0.5 ? '50%' : '2px';
    layer.appendChild(p);
    requestAnimationFrame(()=> p.classList.add('pop'));
    setTimeout(()=> p.remove(), 950);
  }
}

  return `<div class="card rest-card">
    <div class="rest-card-top">
      <div class="rest-card-cat-badge">${m.category}</div>
      <div class="menu-name">${m.name}</div>
      <div class="rest-tag-row">
        <span class="tag">${BUDGET_LABEL[m.budget]}</span>
        <span class="tag">맵기 ${SPICY_LABEL[m.spicy]}</span>
        <span class="tag">${HUNGER_LABEL[m.hunger]}</span>
        ${calorieTagHTML(m, 'menu')}
      </div>
      <div class="menu-reason">${m.reason}</div>
      <div class="menu-meta" style="margin-top:6px;">곁들이면 좋아요: ${m.pair}</div>
    </div>
    <button class="map-link-btn" data-name="${m.name}" data-svc="naver">📍 네이버지도에서 찾기</button>
  </div>`;
}
function openMapSearch(menuName){
  const q = encodeURIComponent(menuName + ' 맛집');
  const url = `https://map.naver.com/v5/search/${q}`;
  window.open(url, '_blank');
}
function bindRestaurantFindButtons(container){
  container.querySelectorAll('.map-link-btn').forEach(btn=>{
    btn.addEventListener('click', ()=> openMapSearch(btn.dataset.name));
  });
}
function goToRestaurantSearch(menuName){
  restaurantsSearchQuery = menuName;
  restaurantsCategory = '전체';
  restaurantsShown = 20;
  switchTab('restaurants');
}
function renderRestaurants(){
  const el = document.getElementById('restaurants-content');
  const cats = ['전체', ...CATEGORIES];
  el.innerHTML = `
    <div class="section-title">🍽️ 식당 둘러보기</div>
    <div class="rest-search-wrap">
      <span class="rest-search-icon">🔍</span>
      <input type="text" id="rest-search-input" class="rest-search-input" placeholder="메뉴 이름으로 검색 (예: 제육볶음)" value="${restaurantsSearchQuery}">
    </div>
    <div class="chip-row" style="margin:14px 0 12px;" id="cat-chips">
      ${cats.map(c=>`<button type="button" class="chip ${restaurantsCategory===c?'selected':''}" data-cat="${c}">${c}</button>`).join('')}
    </div>
    <div id="rest-results-area"></div>
  `;
  el.querySelectorAll('[data-cat]').forEach(btn=>{
    btn.addEventListener('click', ()=>{ restaurantsCategory=btn.dataset.cat; restaurantsShown=20; renderRestaurants(); });
  });
  const searchInput = el.querySelector('#rest-search-input');
  searchInput.addEventListener('input', ()=>{
    restaurantsSearchQuery = searchInput.value;
    restaurantsShown = 20;
    renderRestResults();
  });
  renderRestResults();
}
function renderRestResults(){
  const area = document.getElementById('rest-results-area');
  let filtered = restaurantsCategory==='전체' ? MENU_DATABASE : MENU_DATABASE.filter(m=>m.category===restaurantsCategory);
  const q = restaurantsSearchQuery.trim();
  if(q) filtered = filtered.filter(m=> m.name.includes(q) || m.reason.includes(q));
  area.innerHTML = `
    <div class="rest-count-row">${filtered.length}개 메뉴${q?` · <b>"${q}"</b> 검색결과`:''}</div>
    <div id="rest-list" class="stagger">${filtered.length ? filtered.slice(0, restaurantsShown).map(restaurantCardHTML).join('') : '<div class="empty-note">검색 결과가 없어요.</div>'}</div>
    ${filtered.length>restaurantsShown ? '<button class="btn ghost" id="load-more">더 보기</button>' : ''}
  `;
  const lm = area.querySelector('#load-more');
  if(lm) lm.addEventListener('click', ()=>{ restaurantsShown+=20; renderRestResults(); });
  bindRestaurantFindButtons(area);
}

/* ================= COMMUNITY (personal history feed) ================= */
async function renderCommunity(){
  const el = document.getElementById('community-content');
  el.innerHTML = `
    <div class="section-title">👥 커뮤니티</div>
    <div class="banner"><div class="t1">🌍 이 화면은 오메추를 쓰는 모두와 공유돼요.</div><div class="t2">내가 고른 메뉴와 맛집 제보가 다른 사람에게도 보여요.</div></div>
    <div id="community-shared"><div class="empty-note">불러오는 중...</div></div>
  `;
  const [counts, tips] = await Promise.all([loadCommunityMenuCounts(), loadCommunityTips(), loadMyLikedTips()]);
  renderCommunityShared(counts, tips);
}
function renderCommunityShared(counts, tips){
  const box = document.getElementById('community-shared');
  const top = Object.keys(counts).sort((a,b)=>counts[b]-counts[a]).slice(0,5);
  const maxCount = top.length ? counts[top[0]] : 1;
  const sortedTips = [...tips].sort((a,b)=> tipSortMode==='popular' ? (b.likes||0)-(a.likes||0) : b.ts-a.ts);
  box.innerHTML = `
    <div class="ing-group-title" style="margin-top:0;">🔥 실시간 인기 메뉴</div>
    <div class="card reveal">
      ${top.length ? top.map((name,i)=>`
        <div class="score-row" data-pop-menu="${name}" style="cursor:pointer;">
          <div class="sr-label">${i+1}. ${name}</div>
          <div class="sr-track"><div class="sr-fill" style="width:${Math.round(counts[name]/maxCount*100)}%"></div></div>
          <div class="sr-badge">${counts[name]}</div>
        </div>
      `).join('') : `<div class="empty-note">아직 데이터가 없어요.<br>메뉴를 골라보시면 여기 쌓여요.</div>`}
    </div>
    <div class="ing-group-title" style="display:flex; justify-content:space-between; align-items:center;">
      <span>🏘️ 동네 맛집 제보</span>
      <span class="chip-row" style="margin:0;">
        <button type="button" class="chip ${tipSortMode==='latest'?'selected':''}" data-tipsort="latest" style="padding:6px 12px; font-size:11.5px;">최신순</button>
        <button type="button" class="chip ${tipSortMode==='popular'?'selected':''}" data-tipsort="popular" style="padding:6px 12px; font-size:11.5px;">인기순</button>
      </span>
    </div>
    <div class="card">
      <div class="field"><label>메뉴</label><input type="text" id="tip-menu" placeholder="예: 김치찌개"></div>
      <div class="field"><label>식당 이름</label><input type="text" id="tip-place" placeholder="예: 명동할머니김치찌개"></div>
      <div class="field"><label>한마디 (선택)</label><input type="text" id="tip-note" placeholder="예: 국물이 진짜 진해요"></div>
      <button class="btn secondary" id="tip-submit">제보하기</button>
    </div>
    <div id="tip-list" class="stagger">${sortedTips.length ? sortedTips.map(t=>{
      const tipId = t.id || String(t.ts);
      const liked = myLikedTips.has(tipId);
      return `<div class="card tip-card">
        <div class="menu-name" style="font-size:15px;">${t.place}</div>
        <div class="menu-meta">${t.menu} · ${fmtDate(t.ts)}</div>
        ${t.note ? `<div class="menu-reason">${t.note}</div>` : ''}
        <button class="tip-like-btn ${liked?'liked':''}" data-tip-id="${tipId}" ${liked?'disabled':''}>${liked?'❤️':'🤍'} ${t.likes||0}</button>
      </div>`;
    }).join('') : `<div class="empty-note">아직 제보된 맛집이 없어요.<br>첫 제보를 남겨보세요!</div>`}</div>
  `;
  box.querySelectorAll('[data-pop-menu]').forEach(row=>{
    row.addEventListener('click', ()=> goToRestaurantSearch(row.dataset.popMenu));
  });
  box.querySelectorAll('[data-tipsort]').forEach(btn=>{
    btn.addEventListener('click', ()=>{ tipSortMode = btn.dataset.tipsort; renderCommunityShared(counts, tips); });
  });
  box.querySelectorAll('[data-tip-id]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const tipId = btn.dataset.tipId;
      if(myLikedTips.has(tipId)) return;
      myLikedTips.add(tipId);
      await saveMyLikedTips();
      const newTips = await likeCommunityTip(tipId);
      renderCommunityShared(counts, newTips);
    });
  });
  box.querySelector('#tip-submit').addEventListener('click', async ()=>{
    const menu = box.querySelector('#tip-menu').value.trim();
    const place = box.querySelector('#tip-place').value.trim();
    const note = box.querySelector('#tip-note').value.trim();
    if(!menu || !place){ alert('메뉴랑 식당 이름은 꼭 적어주세요.'); return; }
    const btn = box.querySelector('#tip-submit');
    btn.disabled = true; btn.textContent = '등록 중...';
    const newTips = await addCommunityTip(menu, place, note);
    renderCommunityShared(counts, newTips);
  });
}
/* ================= CALENDAR (meal log + health insights) ================= */
function isCarbHeavy(m){
  if(m.diet.gluten) return true;
  return /밥|죽|면|빵|떡|파스타|국수|동$/.test(m.name);
}
function computeHealthDashboard(){
  const weekAgo = Date.now() - 7*86400000;
  const recentAll = history.filter(h=>h.ts>=weekAgo);
  const recent = recentAll
    .map(h=>({...h, m:MENU_DATABASE.find(x=>x.name===h.menu)}))
    .filter(h=>h.m);
  if(recentAll.length < 3) return null;

  const todayStart = new Date(); todayStart.setHours(0,0,0,0);
  const todayItems = history.filter(h=>h.ts>=todayStart.getTime()).map(h=>{
    let m = MENU_DATABASE.find(x=>x.name===h.menu); if(m) return {obj:m, dbType:'menu'};
    m = HOMECOOK_MENU.find(x=>x.name===h.menu); if(m) return {obj:m, dbType:'homecook'};
    m = CVS_ITEMS.find(x=>x.name===h.menu); if(m) return {obj:m, dbType:'cvs'};
    return null;
  }).filter(Boolean);
  let todayCal = null;
  if(todayItems.length>=1){
    let lo=0, hi=0;
    todayItems.forEach(({obj,dbType})=>{ const c=estimateCalories(obj,dbType); lo+=c.low; hi+=c.high; });
    todayCal = { low: roundCal(lo), high: roundCal(hi) };
  }

  const SOURCE_LABEL = { menu:'외식', homecook:'집밥', cvs:'편의점' };
  const sourceCount = { menu:0, homecook:0, cvs:0 };
  recentAll.forEach(h=>{
    if(MENU_DATABASE.find(x=>x.name===h.menu)) sourceCount.menu++;
    else if(HOMECOOK_MENU.find(x=>x.name===h.menu)) sourceCount.homecook++;
    else if(CVS_ITEMS.find(x=>x.name===h.menu)) sourceCount.cvs++;
  });
  const sourceTotal = sourceCount.menu + sourceCount.homecook + sourceCount.cvs;
  const sourceBalance = sourceTotal ? ['menu','homecook','cvs'].filter(k=>sourceCount[k]>0).map(k=>({
    label: SOURCE_LABEL[k], count: sourceCount[k], pct: Math.round(sourceCount[k]/sourceTotal*100)
  })).sort((a,b)=>b.count-a.count) : [];

  const catCount = {};
  recent.forEach(h=>{ catCount[h.m.category] = (catCount[h.m.category]||0)+1; });
  const categoryBalance = Object.keys(catCount).sort((a,b)=>catCount[b]-catCount[a]).slice(0,5).map(c=>({category:c, count:catCount[c]}));

  const patterns = [];
  const spicyCount = recent.filter(h=>h.m.spicy>=3).length;
  if(spicyCount/recent.length >= 0.5) patterns.push({icon:'🌶️', tone:'watch', text:`최근 매운 음식 비중이 높았어요 (${spicyCount}/${recent.length}번)`});
  const uniqueCats = new Set(recent.map(h=>h.m.category));
  if(uniqueCats.size >= 5) patterns.push({icon:'🌈', tone:'good', text:`최근 ${uniqueCats.size}가지 카테고리를 다양하게 드셨어요`});
  else if(uniqueCats.size <= 2 && recent.length>=4) patterns.push({icon:'🔁', tone:'watch', text:`최근 비슷한 종류가 반복됐어요, 색다른 메뉴는 어때요?`});
  const healthyCount = recent.filter(h=>h.m.category==='건강식').length;
  if(healthyCount>0) patterns.push({icon:'🥗', tone:'good', text:`건강식을 ${healthyCount}번 챙겨 드셨어요`});
  let maxStreak=1, curStreak=1;
  for(let i=1;i<recent.length;i++){
    if(recent[i].m.category===recent[i-1].m.category){ curStreak++; maxStreak=Math.max(maxStreak,curStreak); }
    else curStreak=1;
  }
  if(maxStreak>=3){
    const streakCat = recent[0].m.category;
    patterns.push({icon:'👀', tone:'watch', text:`${streakCat} 종류가 ${maxStreak}번 연속이었어요`});
  }
  const heavyCount = recent.filter(h=>h.m.hunger===3).length;
  if(heavyCount/recent.length >= 0.6) patterns.push({icon:'🍚', tone:'watch', text:`든든한 음식 위주였어요, 가벼운 한끼도 한번 챙겨보세요`});
  const carbCount = recent.filter(h=>isCarbHeavy(h.m)).length;
  if(carbCount/recent.length >= 0.6) patterns.push({icon:'🍞', tone:'watch', text:`면·밥·빵 같은 탄수화물 위주 메뉴 비중이 높았어요 (${carbCount}/${recent.length}번)`});
  const proteinCount = recent.filter(h=>h.m.diet.pork||h.m.diet.beef||h.m.diet.seafood||h.m.diet.egg).length;
  if(proteinCount/recent.length < 0.35 && recent.length>=4) patterns.push({icon:'🥚', tone:'watch', text:`고기·계란·해산물 같은 단백질 메뉴가 적었어요`});
  else if(proteinCount/recent.length >= 0.4 && carbCount/recent.length < 0.6) patterns.push({icon:'⚖️', tone:'good', text:`탄수화물과 단백질을 골고루 챙기셨어요`});

  return { todayCal, categoryBalance, patterns, sourceBalance };
}
function renderCalendar(){
  const el = document.getElementById('calendar-content');
  el.innerHTML = `
    <div class="section-title">📅 식사 기록</div>
    <div class="menu-meta" style="margin:-8px 0 16px; line-height:1.5;">최근 7일간 메뉴를 3번 이상 확정하면 칼로리·밸런스·패턴 같은 건강 인사이트를 보여드려요</div>
    <div id="calendar-body"></div>
  `;
  renderMealLog();
}
let calendarViewDate = new Date();
let calendarSelectedDay = (function(){ const d=new Date(); d.setHours(0,0,0,0); return d.getTime(); })();
function getHistoryByDayKey(){
  const map = {};
  history.forEach(h=>{
    const d = new Date(h.ts); d.setHours(0,0,0,0);
    const key = d.getTime();
    (map[key] = map[key] || []).push(h);
  });
  return map;
}
const ACTIVITY_TIPS = [
  "성인은 주당 150분 이상의 중강도 유산소 활동(빠르게 걷기 등)이 권장돼요. (WHO 기준)",
  "엘리베이터 대신 계단 이용하기처럼, 일상 속 작은 움직임도 꾸준히 쌓이면 건강을 유지하는 데 도움이 돼요.",
  "유산소 운동과 함께 주 2회 이상 근력 운동을 병행하면 더 좋다고 해요.",
  "한 번에 30분씩 주 5회 걷기만으로도 충분한 활동량이 될 수 있어요.",
  "앉아있는 시간이 길다면, 1시간마다 잠깐 일어나 스트레칭 해보는 것도 좋아요.",
  "운동은 '해야만 하는 것'보다 몸을 움직이는 즐거운 시간으로 가볍게 생각해보세요.",
];
function renderMealLog(){
  const box = document.getElementById('calendar-body');
  const dash = computeHealthDashboard();
  const dayOfYear = Math.floor((Date.now()-new Date(new Date().getFullYear(),0,0).getTime())/86400000);
  const tip = ACTIVITY_TIPS[dayOfYear % ACTIVITY_TIPS.length];
  box.innerHTML = `
    <div class="field">
      <label>오늘 뭐 드셨어요?</label>
      <input type="text" id="log-input" placeholder="메뉴 이름 입력 후 Enter">
    </div>
    ${dash ? `
      <div class="ing-group-title" style="margin-top:18px;">🩺 건강 인사이트</div>
      ${dash.todayCal ? `
        <div class="card reveal health-stat-card">
          <div class="health-stat-label">오늘 섭취 추정</div>
          <div class="health-stat-value">${dash.todayCal.low.toLocaleString()}~${dash.todayCal.high.toLocaleString()}<span class="health-stat-unit">kcal</span></div>
          <div class="menu-meta">참고용 추정치예요, 실제 측정값이 아니에요</div>
        </div>
      ` : ''}
      <div class="card reveal activity-tip-card">
        <div class="activity-tip-label">🚶 오늘의 활동 참고</div>
        <div class="activity-tip-text">${tip}</div>
      </div>
      ${dash.categoryBalance.length ? `
        <div class="ing-group-title">이번 주 카테고리 밸런스</div>
        <div class="card reveal">${dash.categoryBalance.map(c=>{
          const max = dash.categoryBalance[0].count;
          const pct = Math.max(8, Math.round(c.count/max*100));
          return `<div class="score-row" style="cursor:default;">
            <div class="sr-label">${c.category}</div>
            <div class="sr-track"><div class="sr-fill" style="width:${pct}%"></div></div>
            <div class="sr-badge">${c.count}</div>
          </div>`;
        }).join('')}</div>
      ` : ''}
      ${dash.sourceBalance.length ? `
        <div class="ing-group-title">어디서 드셨는지</div>
        <div class="card reveal source-balance-row">${dash.sourceBalance.map(s=>{
          const SRC_ICON = {'외식':'🍽️','집밥':'🍳','편의점':'🏪'};
          return `<div class="source-balance-item">
            <div class="source-balance-icon">${SRC_ICON[s.label]}</div>
            <div class="source-balance-pct">${s.pct}%</div>
            <div class="source-balance-label">${s.label}</div>
          </div>`;
        }).join('')}</div>
      ` : ''}
      ${dash.patterns.length ? `
        <div class="ing-group-title">패턴 알아차리기</div>
        <div class="card reveal health-pattern-list">${dash.patterns.map(p=>`
          <div class="health-pattern-row">
            <div class="health-pattern-icon ${p.tone}">${p.icon}</div>
            <div class="health-pattern-text">${p.text}</div>
          </div>
        `).join('')}</div>
      ` : ''}
    ` : ''}
    <div class="ing-group-title" style="margin-top:18px;">기록 달력</div>
    <div id="cal-grid-area"></div>
  `;
  box.querySelector('#log-input').addEventListener('keydown', (e)=>{
    if(e.key==='Enter'){
      const v = e.target.value.trim();
      if(v){ addHistory({menu:v}); renderMealLog(); }
    }
  });
  renderCalGrid();
}
function renderCalGrid(){
  const area = document.getElementById('cal-grid-area');
  const byDay = getHistoryByDayKey();
  const year = calendarViewDate.getFullYear();
  const month = calendarViewDate.getMonth();
  const startDow = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const today = new Date(); today.setHours(0,0,0,0);
  const todayKey = today.getTime();

  const cells = [];
  for(let i=0;i<startDow;i++) cells.push(null);
  for(let d=1; d<=daysInMonth; d++) cells.push(d);

  area.innerHTML = `
    <div class="cal-grid-header">
      <button class="cal-nav-btn" id="cal-prev">‹</button>
      <div class="cal-grid-title">${year}년 ${month+1}월</div>
      <button class="cal-nav-btn" id="cal-next">›</button>
    </div>
    <div class="cal-grid-dow">${['일','월','화','수','목','금','토'].map(d=>`<div>${d}</div>`).join('')}</div>
    <div class="cal-grid">
      ${cells.map(d=>{
        if(d===null) return `<div class="cal-grid-day empty"></div>`;
        const key = new Date(year, month, d).getTime();
        const entries = byDay[key] || [];
        const isToday = key === todayKey;
        const isSelected = calendarSelectedDay === key;
        return `<div class="cal-grid-day ${isToday?'today':''} ${isSelected&&!isToday?'selected':''} ${entries.length?'has-entry':''}" data-day-key="${key}">
          <div class="cal-day-num">${d}</div>
          ${entries.length ? `<div class="cal-day-dot"></div>` : ''}
        </div>`;
      }).join('')}
    </div>
    <div id="cal-day-detail">${renderCalDayDetail(byDay)}</div>
  `;
  area.querySelector('#cal-prev').addEventListener('click', ()=>{
    calendarViewDate = new Date(year, month-1, 1);
    renderCalGrid();
  });
  area.querySelector('#cal-next').addEventListener('click', ()=>{
    calendarViewDate = new Date(year, month+1, 1);
    renderCalGrid();
  });
  area.querySelectorAll('[data-day-key]').forEach(cell=>{
    cell.addEventListener('click', ()=>{
      const key = parseInt(cell.dataset.dayKey);
      calendarSelectedDay = (calendarSelectedDay===key) ? null : key;
      renderCalGrid();
    });
  });
  area.querySelectorAll('[data-log-menu]').forEach(row=>{
    row.addEventListener('click', ()=> goToRestaurantSearch(row.dataset.logMenu));
  });
  area.querySelectorAll('[data-del-ts]').forEach(btn=>{
    btn.addEventListener('click', async (e)=>{
      e.stopPropagation();
      await deleteHistoryEntry(parseFloat(btn.dataset.delTs));
      renderCalGrid();
    });
  });
}
function renderCalDayDetail(byDay){
  if(calendarSelectedDay===null) return '';
  const entries = byDay[calendarSelectedDay] || [];
  const d = new Date(calendarSelectedDay);
  const label = `${d.getMonth()+1}월 ${d.getDate()}일`;
  if(!entries.length){

let wc = { items:[], matches:[], matchIndex:0, winners:[], champion:null };
let wcCategory = null;
function roundLabel(count){
  if(count>=32) return '32강';
  if(count===16) return '16강';
  if(count===8) return '8강';
  if(count===4) return '4강';
  if(count===2) return '결승';
  return '우승';
}
function buildMatches(items){ const m=[]; for(let i=0;i<items.length;i+=2) m.push([items[i], items[i+1]]); return m; }
function renderWorldcupSetup(){
  wcCategory = null;
  const el = document.getElementById('worldcup-content');

function renderWorldcupSizePicker(){
  const box = document.getElementById('wc-size-area');
  const basePool = wcCategory ? MENU_DATABASE.filter(m=>m.category===wcCategory) : MENU_DATABASE;

  `;

    btn.addEventListener('click', ()=> startWorldcup(parseInt(btn.dataset.wcsize)));
  });
}
function startWorldcup(size){
  const basePool = wcCategory ? MENU_DATABASE.filter(m=>m.category===wcCategory) : MENU_DATABASE;
  const pool = excludeConfirmedFrom(basePool);
  const shuffled = [...pool].sort(()=>Math.random()-0.5).slice(0, size);
  wc = { items:shuffled, matches:buildMatches(shuffled), matchIndex:0, winners:[], champion:null };
  renderWorldcupMatch();
}
function renderWorldcupMatch(){
  const el = document.getElementById('worldcup-content');
  const [a,b] = wc.matches[wc.matchIndex];
  const progress = Math.round((wc.matchIndex/wc.matches.length)*100);
  el.innerHTML = `
    <div class="wc-fade-in">
      <div class="round-badge">${roundLabel(wc.items.length)} · ${wc.matchIndex+1}/${wc.matches.length}</div>
      <div class="progress-track"><div class="progress-fill" style="width:${progress}%"></div></div>
      <div style="height:16px;"></div>
      <div class="wc-pair">
        <button class="wc-card" data-pick="a"><div class="nm">${a.name}</div><div class="ct">${a.category} · ${BUDGET_LABEL[a.budget]}</div><div class="wc-desc">${a.reason}</div></button>
        <div class="wc-vs">VS</div>
        <button class="wc-card" data-pick="b"><div class="nm">${b.name}</div><div class="ct">${b.category} · ${BUDGET_LABEL[b.budget]}</div><div class="wc-desc">${b.reason}</div></button>
      </div>
    </div>
  `;
  el.querySelector('[data-pick="a"]').addEventListener('click', ()=>selectWc(a, 'a'));
  el.querySelector('[data-pick="b"]').addEventListener('click', ()=>selectWc(b, 'b'));
}
function selectWc(winner, side){
  const el = document.getElementById('worldcup-content');
  const picked = el.querySelector(`[data-pick="${side}"]`);
  const other = el.querySelector(`[data-pick="${side==='a'?'b':'a'}"]`);
  if(picked) picked.classList.add('picked');
  if(other) other.style.opacity = '0.35';
  el.querySelectorAll('.wc-card').forEach(c=> c.style.pointerEvents='none');
  wc.winners.push(winner);
  wc.matchIndex++;
  setTimeout(()=>{
    const wrap = el.querySelector('.wc-fade-in') || el.firstElementChild;
    if(wrap) wrap.classList.add('wc-fade-out');
    setTimeout(()=>{
      if(wc.matchIndex >= wc.matches.length){
        if(wc.winners.length===1){ wc.champion = wc.winners[0]; renderWorldcupChampion(); return; }
        wc.items = wc.winners;
        wc.matches = buildMatches(wc.items);
        wc.matchIndex = 0;
        wc.winners = [];
      }
      renderWorldcupMatch();
    }, 180);
  }, 320);
}

/* ================= WHO'S GOT IT? (participant roulette) ================= */
let rouletteNames = [];
let rouletteSpinning = false;
function buildRouletteWheel(names){
  const n = names.length;
  const anglePer = 360/n;
  const colors = ['#FF6B9D','#FFC93C','#3DCFB6','#5DADE2','#B99AF5','#FF8566','#7B9FD4','#F7A6C4'];
  const gradient = names.map((_,i)=> `${colors[i%colors.length]} ${i*anglePer}deg ${(i+1)*anglePer}deg`).join(', ');
  const labels = names.map((name,i)=>{
    const midAngle = i*anglePer + anglePer/2 - 90;
    const rad = midAngle * Math.PI/180;
    const x = 50 + 33*Math.cos(rad);
    const y = 50 + 33*Math.sin(rad);
    return `<div class="roulette-label" style="left:${x}%; top:${y}%;">${name}</div>`;
  }).join('');
  return { gradient, labels };
}
function renderRoulette(){
  rouletteSpinning = false;
  const el = document.getElementById('roulette-content');
  el.innerHTML = `
    <div class="section-title">🔫 누가 쏠까?</div>
    <div class="menu-meta" style="margin-bottom:14px;">같이 먹는 사람들 이름을 넣고 룰렛을 돌려보세요</div>
    <div class="field">
      <label>이름 추가</label>
      <input type="text" id="roulette-name-input" placeholder="이름 입력 후 Enter">
    </div>
    <div class="chip-row" id="roulette-name-list">${rouletteNames.map((n,i)=>`<button type="button" class="chip selected" data-rm-name="${i}">${n} ✕</button>`).join('')}</div>
    <button class="btn" id="roulette-start" style="margin-top:16px;" ${rouletteNames.length<2?'disabled':''}>${rouletteNames.length<2 ? '2명 이상 입력해주세요' : '🔫 룰렛 시작'}</button>
  `;
  const input = document.getElementById('roulette-name-input');
  input.addEventListener('keydown', (e)=>{
    if(e.key==='Enter'){
      const v = input.value.trim();
      if(v && !rouletteNames.includes(v)) rouletteNames.push(v);
      input.value='';
      renderRoulette();
    }
  });
  el.querySelectorAll('[data-rm-name]').forEach(btn=>{
    btn.addEventListener('click', ()=>{ rouletteNames.splice(parseInt(btn.dataset.rmName),1); renderRoulette(); });
  });
  if(rouletteNames.length>=2){
    document.getElementById('roulette-start').addEventListener('click', renderRouletteWheelScreen);
  }
}
function renderRouletteWheelScreen(){
  const el = document.getElementById('roulette-content');
  const {gradient, labels} = buildRouletteWheel(rouletteNames);
  el.innerHTML = `
    <div class="section-title">🔫 누가 쏠까?</div>
    <div class="menu-meta">긴장하세요... 방아쇠를 당길 시간이에요</div>
    <div class="roulette-wrap">
      <div class="roulette-pointer">▼</div>
      <div class="roulette-wheel" id="roulette-wheel" style="background:conic-gradient(${gradient});">${labels}<div class="roulette-hub">🔫</div></div>
    </div>
    <button class="btn" id="roulette-spin">방아쇠 당기기</button>
    <button class="btn ghost" id="roulette-edit" style="margin-top:10px;">명단 다시 정하기</button>
    <div id="roulette-result"></div>
  `;
  document.getElementById('roulette-spin').addEventListener('click', spinRoulette);
  document.getElementById('roulette-edit').addEventListener('click', renderRoulette);
}
function spinRoulette(){
  if(rouletteSpinning) return;
  rouletteSpinning = true;
  const wheel = document.getElementById('roulette-wheel');
  const btn = document.getElementById('roulette-spin');
  btn.disabled = true;
  const n = rouletteNames.length;
  const anglePer = 360/n;
  const targetIdx = Math.floor(Math.random()*n);
  const segCenter = targetIdx*anglePer + anglePer/2;
  const finalRotation = 5*360 + (360 - segCenter);
  wheel.style.transform = `rotate(${finalRotation}deg)`;
  setTimeout(()=>{
    const picked = rouletteNames[targetIdx];
    const wrap = document.querySelector('.roulette-wrap');
    if(wrap) wrap.classList.add('roulette-shake');
    document.getElementById('roulette-result').innerHTML = `
      <div class="roulette-bang reveal">

function findMenuInfo(name){
  let m = MENU_DATABASE.find(x=>x.name===name);
  if(m) return { category: m.category, isSpicy: m.spicy===3, dbType:'menu' };
  m = HOMECOOK_MENU.find(x=>x.name===name);
  if(m) return { category: m.category, isSpicy: m.spice==='매운맛', dbType:'homecook' };
  m = CVS_ITEMS.find(x=>x.name===name);
  if(m) return { category: m.category, isSpicy: !!m.spicy, dbType:'cvs' };
  return null;
}
const TASTE_STATS = [
  { id:'dessert', icon:'🍰', name:'디저트 박사', check: info => info.category==='카페/디저트' },
  { id:'world', icon:'🌍', name:'세계 탐험가', check: info => info.category==='세계음식' },
  { id:'healthy', icon:'🥗', name:'건강 지킴이', check: info => info.category==='건강식' },
  { id:'homecook', icon:'🍳', name:'집밥 요리사', check: info => info.dbType==='homecook' },
];
function statLevel(count){ return Math.min(5, Math.floor(count/3)+ (count>0?1:0)); }
function computeTasteCharacter(){
  const infos = history.map(h=>findMenuInfo(h.menu)).filter(Boolean);
  const statCounts = {};
  TASTE_STATS.forEach(s=>{ statCounts[s.id] = infos.filter(s.check).length; });
  const totalDecisions = history.length;
  const totalLevel = Math.min(30, Math.floor(totalDecisions/3)+1);
  let avatarTier;
  if(totalLevel>=16) avatarTier = '👑';
  else if(totalLevel>=11) avatarTier = '🦅';
  else if(totalLevel>=6) avatarTier = '🐥';
  else if(totalLevel>=2) avatarTier = '🐣';
  else avatarTier = '🥚';
  let topStat = null, topCount = 0;
  TASTE_STATS.forEach(s=>{ if(statCounts[s.id] > topCount){ topCount = statCounts[s.id]; topStat = s; } });
  const title = (topStat && topCount>=3) ? topStat.name : '미식 새싹';
  return { totalLevel, totalDecisions, avatarTier, title, statCounts };
}
function computeUserStats(){
  const byCategory = {};
  let spicyCount = 0;
  history.forEach(h=>{
    const info = findMenuInfo(h.menu);
    if(info){
      byCategory[info.category] = (byCategory[info.category]||0)+1;
      if(info.isSpicy) spicyCount++;
    }
  });
  const dayKeys = new Set(history.map(h=>{
    const d = new Date(h.ts); d.setHours(0,0,0,0);
    return d.getTime();
  }));
  let streak = 0;
  let cursor = new Date(); cursor.setHours(0,0,0,0);
  if(!dayKeys.has(cursor.getTime())) cursor.setDate(cursor.getDate()-1);
  while(dayKeys.has(cursor.getTime())){ streak++; cursor.setDate(cursor.getDate()-1); }
  return { total: history.length, byCategory, uniqueCategories: Object.keys(byCategory).length, spicyCount, streak };
}

/* ---------- scoring shared ---------- */
function hcMainTypeMatches(menuType, selected){
  if(!selected) return true;
  if(menuType===selected) return true;
  if(selected==='파스타' && menuType.startsWith('파스타')) return true;
  if(selected==='단백질 위주' && menuType.includes('단백질')) return true;
  return false;
}
function hcBaseScore(menu){
  let score = 0;
  if(hc.difficulty){
    const wantTier = HC_DIFF_TIER[HC_DIFF_MAP[hc.difficulty]];
    const gotTier = HC_DIFF_TIER[menu.difficulty] || 1;
    const d = Math.abs(wantTier-gotTier);
    score += d===0?20:(d===1?8:-15);
  }
  if(hc.sub.spice) score += (menu.spice===hc.sub.spice) ? 15 : 0;
  if(hc.sub.mainType) score += hcMainTypeMatches(menu.mainType, hc.sub.mainType) ? 15 : 0;
  if(hc.sub.fullness) score += (menu.fullness===hc.sub.fullness) ? 15 : 0;
  if(hc.sub.mood && menu.mood && menu.mood.includes(hc.sub.mood)) score += 30;
  return score;
}
function hcCategoryPool(){ return hc.category ? HOMECOOK_MENU.filter(m=>m.category===hc.category) : HOMECOOK_MENU; }
function hcMatchRate(menu){
  const ing1 = menu.ing['1'];
  const mainList = ing1.filter(i=>!i.isSeasoning).map(i=>i.name);
  const seasonList = ing1.filter(i=>i.isSeasoning && i.name!=='물').map(i=>i.name);
  const totalNeeded = mainList.length + seasonList.length;
  if(!totalNeeded) return { pct:100, missing:[] };
  const haveMain = mainList.filter(ing => hc.fridgeItems.some(f=> ing.includes(f) || f.includes(ing)));
  const haveSeason = seasonList.filter(ing => hc.seasonItems.some(f=> ing.includes(f) || f.includes(ing)));
  const missingMain = mainList.filter(i=>!haveMain.includes(i));
  const missingSeason = seasonList.filter(i=>!haveSeason.includes(i));
  const pct = Math.round((haveMain.length+haveSeason.length)/totalNeeded*100);
  return { pct, missing: missingMain, missingSeason };
}
function hcComputeFridgeCandidates(){
  const limit = hc.category ? 3 : 5;
  hc.candidates = hcCategoryPool().map(m=>{
    const match = hcMatchRate(m);
    return { menu:m, score: hcBaseScore(m) + match.pct*0.6, match };
  }).sort((a,b)=>b.score-a.score).slice(0,limit);
}
function hcShoppingFilteredPool(){
  let pool = hcCategoryPool();
  if(hc.sub.hunger){
    const wantTier = {'가볍게':1,'보통':2,'든든하게':3}[hc.sub.hunger];
    const exact = pool.filter(m=>m.hunger===wantTier);
    if(exact.length) pool = exact;
  }
  if(hc.sub.budget){
    const wantTier = {'저렴하게':1,'보통':2,'넉넉하게':3}[hc.sub.budget];
    const exact = pool.filter(m=>m.budget===wantTier);
    if(exact.length) pool = exact;
  }
  return pool;
}
function hcComputeShoppingCandidates(){
  hc.candidates = hcShoppingFilteredPool().map(m=>({ menu:m, score: hcBaseScore(m) + Math.random()*5 }))
    .sort((a,b)=>b.score-a.score).slice(0,3);
}

/* ================= CONVENIENCE STORE MODE (편의점 모드) ================= */
let cvs = { category:null, sub:null, budget:null, spicy:null };
let cvsShownIds = new Set();
let cvsRenderGen = 0;
const CVS_PRICE_LABEL = {1:'~2,000원대', 2:'2,000~4,000원대', 3:'4,000원 이상'};
const CVS_CATEGORIES = [
  { id:'한끼', emoji:'🍱', color:'#FFE8D6' },
  { id:'라면', emoji:'🍜', color:'#FFDDD6' },
  { id:'과자', emoji:'🍿', color:'#FFF3D6' },
  { id:'아이스크림', emoji:'🍦', color:'#D6F0FF' },
  { id:'음료', emoji:'🥤', color:'#D6F5E8' },
  { id:'안주', emoji:'🍻', color:'#F0D6FF' },
];
const CVS_CATEGORY_QUESTIONS = {
  '한끼': { subOptions:['도시락','김밥','샌드위치','삼각김밥','즉석조리'], spicy:true },
  '라면': { subOptions:null, spicy:true },
  '과자': { subOptions:['과자','디저트'], spicy:false },
  '아이스크림': { subOptions:null, spicy:false },
  '음료': { subOptions:['커피','탄산','이온음료','기능성','유제품','주스','기타'], spicy:false },
  '안주': { subOptions:['마른안주','즉석안주','주류'], spicy:false },
};
function cvsTransition(renderFn){
  const el = document.getElementById('cvs-content');
  const myGen = ++cvsRenderGen;
  el.classList.add('qz-anim-out');
  setTimeout(()=>{
    if(myGen !== cvsRenderGen) return;
    renderFn();
    el.classList.remove('qz-anim-out');
    el.classList.add('qz-anim-in');
    setTimeout(()=> el.classList.remove('qz-anim-in'), 300);
  }, 200);
}
function cvsScore(item, useTags){
  let score = Math.random()*8;
  if(!useTags) return score + (item.popular?4:0);
  if(cvs.sub && item.sub===cvs.sub) score += 20;
  if(cvs.budget){
    const wantTier = {'저렴하게':1,'보통':2,'넉넉하게':3}[cvs.budget];
    score += (3 - Math.abs(item.price - wantTier)) * 11;
  }
  if(cvs.spicy==='매운거') score += item.spicy ? 26 : -12;
  if(cvs.spicy==='안매운거') score += !item.spicy ? 18 : -18;
  if(item.popular) score += 5;
  return score;
}
function cvsDraw(useTags){
  let pool = cvs.category ? CVS_ITEMS.filter(it=>it.category===cvs.category) : CVS_ITEMS;
  if(useTags && cvs.sub){
    const subPool = pool.filter(it=>it.sub===cvs.sub);
    if(subPool.length) pool = subPool;
  }
  if(useTags && cvs.spicy && cvs.spicy!=='상관없음'){
    const wantSpicy = cvs.spicy==='매운거';
    const spicyPool = pool.filter(it=>it.spicy===wantSpicy);
    if(spicyPool.length) pool = spicyPool;
  }
  if(useTags && cvs.budget){
    const wantTier = {'저렴하게':1,'보통':2,'넉넉하게':3}[cvs.budget];
    const exactPool = pool.filter(it=>it.price===wantTier);
    if(exactPool.length) pool = exactPool;
    else{
      const closePool = pool.filter(it=>Math.abs(it.price-wantTier)<=1);
      if(closePool.length) pool = closePool;
    }
  }
  const scored = pool.map(it=>({item:it, score:cvsScore(it, useTags)})).sort((a,b)=>b.score-a.score);
  const poolSize = useTags ? 6 : 10;
  const top = scored.slice(0,poolSize).filter(s=>!cvsShownIds.has(s.item.id));
  const candidates = top.length ? top : (cvsShownIds.clear(), scored.slice(0,poolSize));
  const picked = candidates[Math.floor(Math.random()*candidates.length)];
  cvsShownIds.add(picked.item.id);
  return picked.item;
}
function renderCvsHome(){
  cvs = { category:null, sub:null, budget:null, spicy:null };
  cvsShownIds.clear();
  const el = document.getElementById('cvs-content');

function renderCvsQuestions(category){
  const el = document.getElementById('cvs-content');
  const cfg = CVS_CATEGORY_QUESTIONS[category];
  let html = `<div class="section-title">${category} 취향을 알려주세요</div>`;

  }
  html += `<div class="field"><label>예산</label><div class="chip-row">${['저렴하게','보통','넉넉하게'].map(v=>`<button type="button" class="chip ${cvs.budget===v?'selected':''}" data-cvsbudget="${v}">${v}</button>`).join('')}</div></div>`;
  html += `<div class="menu-meta" style="margin-bottom:14px;">선택 안 하면 전체로 볼게요</div>

    btn.addEventListener('click', ()=>{ cvs.spicy = (cvs.spicy===btn.dataset.cvsspicy)?null:btn.dataset.cvsspicy; renderCvsQuestions(category); });
  });
  el.querySelectorAll('[data-cvsbudget]').forEach(btn=>{
    btn.addEventListener('click', ()=>{ cvs.budget = (cvs.budget===btn.dataset.cvsbudget)?null:btn.dataset.cvsbudget; renderCvsQuestions(category); });
  });
  el.querySelector('#cvs-recommend').addEventListener('click', ()=>{ cvsShownIds.clear(); cvsTransition(()=>renderCvsCapsule(true)); });
  el.querySelector('#cvs-cat-back').addEventListener('click', ()=> cvsTransition(renderCvsHome));

function renderCvsCapsule(useTags){
  const el = document.getElementById('cvs-content');
  el.innerHTML = `
    <div class="qz-capsule-wrap">
      <div class="qz-confetti-layer" id="cvs-confetti-layer"></div>
      <div class="qz-capsule shaking" id="cvs-capsule">
        <div class="qz-cap-half top"><div class="fill"></div><div class="qz-cap-shine"></div></div>
        <div class="qz-cap-half bottom"><div class="fill"></div></div>
      </div>
      <div class="qz-drawing-label">편의점 뒤지는 중...</div>
    </div>
  `;
  const picked = cvsDraw(useTags);
  const myGen = cvsRenderGen;
  setTimeout(()=>{
    if(myGen !== cvsRenderGen) return;
    const cap = document.getElementById('cvs-capsule');
    if(cap){ cap.classList.remove('shaking'); cap.classList.add('cracking'); }
    qzBurstConfettiInto('cvs-confetti-layer');
    setTimeout(()=>{ if(myGen === cvsRenderGen) renderCvsResult(picked, useTags); }, 420);
  }, 650);
}
function qzBurstConfettiInto(layerId){
  const layer = document.getElementById(layerId);
  if(!layer) return;
  const colors = ['#FF6B9D','#FFC93C','#3DCFB6','#5DADE2','#B99AF5'];
  for(let i=0;i<26;i++){
    const p = document.createElement('div');
    p.className = 'qz-confetti';
    const angle = Math.random()*Math.PI*2;
    const dist = 70 + Math.random()*90;
    p.style.setProperty('--dx', Math.cos(angle)*dist+'px');
    p.style.setProperty('--dy', Math.sin(angle)*dist - 30+'px');
    p.style.setProperty('--rot', (Math.random()*360)+'deg');
    p.style.background = colors[i%colors.length];
    p.style.borderRadius = Math.random()>0.5 ? '50%' : '2px';
    layer.appendChild(p);
    requestAnimationFrame(()=> p.classList.add('pop'));
    setTimeout(()=> p.remove(), 950);
  }
}

  else{ closeOverlay(); switchTab('home'); }
});

  await loadState();
  renderHome();
})();
</script>
